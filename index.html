<style>
:root{--bg:#070D1A;--card:#111A2D;--card2:#16213A;--border:#1E2F4A;--border2:#263A5A;--text:#EEF6FF;--muted:#8AA0BF;--accent:#6BE7FF;--accent2:#7CFFB2;--r2:22px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg); color:var(--text); font-family:'Manrope',system-ui,sans-serif; min-height:100vh; overflow-x:hidden}
body::before{content:''; position:fixed; inset:0; background:radial-gradient(900px 600px at 18% -5%, rgba(107,231,255,.20), transparent 65%),radial-gradient(700px 500px at 90% 5%, rgba(124,255,178,.14), transparent 60%),radial-gradient(800px 600px at 50% 115%, rgba(138,180,255,.16), transparent 70%); pointer-events:none; z-index:-1}
.header{position:sticky; top:0; z-index:50; backdrop-filter:blur(22px); background:rgba(7,13,26,.82); border-bottom:1px solid var(--border)}
.header-inner{max-width:1440px; margin:0 auto; padding:18px 28px; display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap}
.logo{display:flex; align-items:center; gap:12px; font-family:'Nunito',sans-serif; font-weight:900; font-size:22px; letter-spacing:-.03em}
.logo-mark{width:42px; height:42px; border-radius:13px; background:linear-gradient(135deg,var(--accent),#8AB4FF); display:grid; place-items:center; color:#04101A; font-size:20px; font-weight:900; box-shadow:0 0 24px rgba(107,231,255,.35)}
.search-wrap{position:relative; width:min(480px,100%)}
.search-wrap input{width:100%; height:46px; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:0 18px 0 48px; color:var(--text); font-size:15px; outline:none; transition:.2s}
.search-wrap input:focus{border-color:var(--accent); box-shadow:0 0 0 4px rgba(107,231,255,.13)}
.search-wrap svg{position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--accent); opacity:.7}
.wrap{max-width:1440px; margin:0 auto; padding:28px; display:grid; grid-template-columns:180px 1fr; gap:28px}
@media(max-width:1024px){.wrap{grid-template-columns:1fr}}
.sidebar{position:sticky; top:88px; align-self:start; background:rgba(17,26,45,.72); border:1px solid var(--border); border-radius:22px; padding:16px; backdrop-filter:blur(18px)}
.stats{background:linear-gradient(135deg, rgba(107,231,255,.16), rgba(124,255,178,.10)); border:1px solid rgba(107,231,255,.22); border-radius:16px; padding:14px; display:flex; justify-content:space-between; overflow:hidden}
.stat-val{font-family:'Nunito',sans-serif; font-size:20px; font-weight:900}
.grid{display:grid; grid-template-columns:repeat(3,1fr); gap:22px}
.card{background:var(--card); border:1px solid var(--border); border-radius:24px; overflow:hidden; transition:.32s; position:relative; cursor:pointer; box-shadow:0 12px 32px rgba(0,0,0,.22)}
.card:hover{transform:translateY(-6px); border-color:rgba(107,231,255,.35); box-shadow:0 24px 60px rgba(0,0,0,.45)}
.card-cover{height:420px; position:relative; overflow:hidden; background:radial-gradient(600px 400px at 50% 0%, #1C2A44, #0F1628); isolation:isolate}
.card-cover .cover-bg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:blur(30px) brightness(.6) saturate(1.3); transform:scale(1.3); opacity:.85; z-index:0}
.card-cover .cover-main{position:absolute; inset:0; z-index:1; width:100%; height:100%; object-fit:cover; object-position:center; transition:.45s; filter:drop-shadow(0 12px 28px rgba(0,0,0,.55))}
.card:hover .cover-main{transform:scale(1.05)}
.card-cover::after{content:''; position:absolute; inset:0; z-index:2; background:linear-gradient(to top, var(--card) 6%, transparent 50%); pointer-events:none}
.cover-fallback{position:relative; z-index:1; font-family:'Nunito'; font-size:58px; font-weight:900; color:var(--accent); opacity:.18; text-align:center; padding:24px}
.cover-fallback small{display:block; font-size:11px; color:var(--muted); margin-top:12px}

.card-body{padding:10px 12px 10px; background:var(--card)}
.card-title{font-family:'Nunito'; font-size:15px; font-weight:800; line-height:1.15; min-height:36px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.card-meta{display:flex; gap:6px; margin-top:10px; flex-wrap:wrap}
.meta-tag{font-size:11px; font-weight:700; padding:5px 11px; border-radius:999px; background:var(--card2); border:1px solid var(--border); color:var(--muted)}
.meta-tag.accent{color:var(--accent); background:rgba(107,231,255,.13); border-color:rgba(107,231,255,.28)}
.empty{grid-column:1/-1; padding:80px 20px; text-align:center; background:var(--card); border:1px dashed var(--border2); border-radius:22px}
.modal-back{position:fixed; inset:0; background:rgba(0,0,0,.68); backdrop-filter:blur(16px); display:none; place-items:center; z-index:100; padding:20px}
.modal-back.open{display:grid}
.modal{width:min(760px,100%); max-height:92vh; display:flex; flex-direction:column; overflow:hidden; background:linear-gradient(180deg,var(--card2),var(--card)); border:1px solid var(--border2); border-radius:26px; box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-cover{height:380px; position:relative; background:#0A1020; overflow:hidden; flex-shrink:0}
.modal-cover img{width:100%; height:100%; object-fit:contain; background:radial-gradient(600px 400px at 50% 0%, rgba(107,231,255,.15), transparent)}
.modal-close{position:absolute; top:16px; right:16px; z-index:4; width:40px; height:40px; border-radius:999px; background:rgba(7,13,26,.7); border:1px solid rgba(255,255,255,.14); color:#fff; display:grid; place-items:center; cursor:pointer}
.modal-body{padding:22px 24px 24px; overflow-y:auto; flex:1; min-height:0}
.modal-title{flex-shrink:0; font-family:'Nunito'; font-size:26px; font-weight:900; margin-bottom:12px}
.sort-select{height:42px; padding:0 16px; border-radius:999px; background:var(--card); border:1px solid var(--border); color:var(--text); font-size:14px; font-weight:600; outline:none}
</style>
</head>

  'ведьмак':['ведьмак','the witcher','witcher'],
  'witcher':['witcher','ведьмак','the witcher'],
  'the witcher':['the witcher','ведьмак','witcher'],
  'gwent':['gwent','гвинт'],
  'гвинт':['гвинт','gwent'],
  'кровная':['кровная вражда','thronebreaker','the witcher tales'],
  'thronebreaker':['thronebreaker','кровная вражда','ведьмак'],
  'бесконечное лето':['бесконечное лето','everlasting summer'],
  'everlasting summer':['everlasting summer','бесконечное лето'],
  'холат':['холат','kholat'],
  'kholat':['kholat','холат']
};
function expandQuery(q){
  const words = q.toLowerCase().split(/\s+/).filter(Boolean);
  const expanded = new Set([q]);
  for(const w of words){
    if(SEARCH_MAP[w]) SEARCH_MAP[w].forEach(t=>expanded.add(t.toLowerCase()));
  }
  return Array.from(expanded);
}
let filtered=[...GAMES], active={search:"", sort:"title-asc"};
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function applyFilters(){
  let out=[...GAMES];
  const q=active.search.toLowerCase().trim();
  if(q) {
    const terms = expandQuery(q);
    out=out.filter(g=> {
      const text = ((g.title||'') + ' ' + (g.altTitle||'') + ' ' + (g.genre||'') + ' ' + (g.platform||'')).toLowerCase();
      return terms.some(t => text.includes(t));
    });
  }
  if(active.sort==='title-asc') out.sort((a,b)=>a.title.localeCompare(b.title));
  else out.sort((a,b)=>b.title.localeCompare(a.title));
  filtered=out; render();
}
let visibleCount=72;
function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const st=document.getElementById('statTotal'); if(st) st.textContent=GAMES.length;
  const sf=document.getElementById('statFiltered'); if(sf) sf.textContent=filtered.length;
  const sc=document.getElementById('sideCollection'); if(sc) sc.textContent=GAMES.length;
  const toShow=filtered.slice(0,visibleCount);
  if(!toShow.length){ grid.innerHTML='<div class="empty"><h3>Ничего не нашлось</h3></div>'; return; }
  toShow.forEach(g=>{
    const el=document.createElement('div'); el.className='card';
    el.onclick=()=>{ document.getElementById('modalTitle').textContent=g.title; const img=document.getElementById('modalImg'); img.src=g.image||''; img.style.display=g.image?'block':'none'; document.getElementById('modalBack').classList.add('open'); };
    const initials=g.title.slice(0,2).toUpperCase();
    const imgBlock=g.image ? `<img class="cover-bg" src="${esc(g.image)}" loading="lazy"><img class="cover-main" src="${esc(g.image)}" loading="lazy" alt="${esc(g.title)}">` : `<div class="cover-fallback">${initials}</div>`;
    el.innerHTML=`<div class="card-cover">${imgBlock}</div><div class="card-body"><div class="card-title">${esc(g.title)}</div><div class="card-meta"><span class="meta-tag accent">${esc(g.genre.split(',')[0])}</span><span class="meta-tag">${g.year}</span></div></div>`;
    grid.appendChild(el);
  });
  if(filtered.length>visibleCount){
    const more=document.createElement('div'); more.style.gridColumn='1 / -1'; more.style.textAlign='center'; more.style.padding='20px';
    more.innerHTML=`<button class="btn" style="height:44px; padding:0 22px; border-radius:999px; background:var(--text); color:var(--bg); font-weight:800" onclick="visibleCount+=72; render();">Показать ещё 72 (${visibleCount} / ${filtered.length})</button>`;
    grid.appendChild(more);
  }
}
function closeModal(){ document.getElementById('modalBack').classList.remove('open'); }
document.getElementById('modalBack').addEventListener('click',e=>{ if(e.target.id==='modalBack') closeModal(); });
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('searchInput').addEventListener('input',e=>{ active.search=e.target.value; visibleCount=72; applyFilters(); });
document.getElementById('sortSelect').addEventListener('change',e=>{ active.sort=e.target.value; visibleCount=72; applyFilters(); });
applyFilters();
</script>
<button onclick="window.scrollTo({top:0,behavior:'smooth'})" style="position:fixed; bottom:24px; right:24px; z-index:99; background:linear-gradient(135deg,var(--accent),#8AB4FF); color:#04101A; border:none; border-radius:999px; width:48px; height:48px; font-size:22px; font-weight:900; cursor:pointer; box-shadow:0 8px 24px rgba(107,231,255,.35); transition:.2s; opacity:.9" title="Вверх">↑</button>
