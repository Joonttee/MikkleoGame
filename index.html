steamstatic.com/store_item_assets/steam/apps/2410490/header.jpg?t=1782218257", "desc": "Sneak Out — это сумасшедшая многопользовательская игра в прятки, переполненная проделками, розыгрышами и баловством. В ней могут соревноваться до шести игроков. Вместе с пятью друзьями вы отправитесь в замок с привидениями, при этом один из вас будет наугад выбран на роль Охотника. Остальные игроки должны спрятаться и выжить в замке, выполняя задания и избегая Охотника, пока не откроется портал для побега. Менее расторопные игроки, которых поймают, могут помогать своим друзьям в роли Призраков, подшучивая над преследователями. А тот, кто становится Охотником, должен сделать все возможное, чтобы не дать всем сбежать. Звучит несложно, правда? Как в обожаемой всеми детской игре. Но задачи здесь гораздо коварнее. Поймайте всех в роли Охотника Это самая озорная игра в прятки на свете, и... вы окажетесь в самом центре ее событий! Будучи выбранным наугад, вы должны стать самым хитрым Охотником в мире, заставив остальных бояться за свою шкуру! Выберите своего любимого персонажа из списка ужасающих монстров, таких как Жнец с косой наготове, кровожадный Дракула или тыквоголовое Пугало (и это лишь некоторые из них), и погрузитесь в захватывающую атмосферу погони, воспользовавшись уникальными...", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-wekz1e", "title": "Solo Leveling: ARISE OVERDRIVE", "genre": "Экшены, Ролевые игры", "platform": "Steam/Epic", "year": 2025, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2373990/018068a74847b3953278efacca07cfbe537a46c7/header.jpg?t=1781758887", "desc": "[Расширенная версия любимой истории с новыми главами] Сопроводите Сон Чину на пути к тому, чтобы стать сильнейшим охотником в мире! Нырните с головой в оригинальную историю из вебтуна и новые приключения, добавленные специально для игры! [Экшен со вкусом] Оцените динамичные, эстетично анимированные бои, чей ход зависит от выбранного вами ору ого комплекса. Будьте предельно осторожны, ведь опасность подстерегает за каждым поворотом: заражённые люди, безобразные существа, безумные роботы и вездесущий загадочный ИИ. Вам предстоит искать персональный подход к каждому противнику. Помните, что сопротивление бесполезно: хитрость и быстрые ноги - вот ваше главное оружие.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-1zn9v2", "title": "Songs of Conquest", "genre": "Приключенческие игры, Ролевые игры, Стратегии", "platform": "Steam/Epic", "year": 2024, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/867210/1b5b1025d51c42b6d4bb955737068e513b45382d/header.jpg?t=1780586065", "desc": "Songs of Conquest — пошаговая стратегия, вдохновленная нестареющей классикой девяностых. Нанимайте могущественных магистров, управляйте огромными армиями, ищите артефакты, отстраивайте свои города и захватывайте вражеские — в этом мире есть место только для одной великой империи! Великие приключения Исследуйте разнообразные карты с характерными биомами, уникальными противниками и сокровищами. Великие империи Распределяйте ресурсы, проводите исследования и расширяйте свою территорию. Не существует единственно верного решения — иногда лучше вложить все в армия лучников, чем в небольшой отряд легионеров, а иногда наоборот. Великие сражения Вас ждет глубокая боевая система, в которой есть место и магии, и уникальным способностям существ. Только вам решать, в чем будет заключаться ваша тактика. Бесконечные возможности Карты от Lavapotion,пользовательские карты, случайные карты, схватки один на один и карты-головоломки — в Songs of Conquest вы обязательно найдете что-то себе по вкусу! Играйте с друзьями Исследуйте мир Эрбора в одиночку, заручитесь помощью друга или создайте себе ИИ-союзника — большая часть карт поддерживает все эти режимы, включая режим игры за одним устройством. Четыре...", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-s3hgtm", "title": "Songs of Silence", "genre": "Приключенческие игры, Инди, Ролевые игры", "platform": "Steam/Epic", "year": 2024, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2195410/a23dc3dc83a4871b151cd62533802bcac262746c/header.jpg?t=1780306482", "desc": "Пошаговая стратегия сочетается с боями в реальном времени, каждое ваше решение влияет на судьбу вашего королевства! Играйте в сюжетную кампанию, быстрые случайные схватки в одиночном режиме или по сети, либо сражайтесь на тщательно проработанных картах сценариев. Погрузитесь в захватывающую одиночную кампанию, разработанную как для новичков, так и для опытных стратегов. 8 карт кампании – Ведите королеву Лорелай и её народ к новому дому, вырвитесь из хватки Схизмы и попытайтесь преодолеть разрыв между враждующими цивилизациями. 3 уровня сложности – Новичок в стратегии? Насладитесь спокойной игрой в режиме истории. Или испытайте свои силы на высоких уровнях сложности с эксклюзивными достижениями и квестами. Побочные задания и секреты – Встречайте необычных персонажей и находите скрытые сокровища… Проверьте свои стратегические навыки в 100+ случайных схватках, предлагающих бесконечное множество возможностей для повторного прохождения, как в одиночном режиме, так и кооперативном или соревновательном по сети. Разнообразные настройки карт – Выбирайте из 3 размеров (S, M, L) и 2 форматов (односторонний или двусторонний) для создания индивидуального тактического опыта. Гибкие стили игры –...", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-znh0j2", "title": "Sonic Mania", "genre": "Action, Adventure, Casual", "platform": "Steam/Epic", "year": 2017, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/584400/header.jpg?t=1762751921", "desc": "Sonic Mania is an all-new adventure with Sonic, Tails, and Knuckles full of unique bosses, rolling 2D landscapes, and fun classic gameplay.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-y o specific Jedi abilities. Choose the light or the dark side of the Force as you progress through the story. The choices you make will affect your character, those in your party and those who may join you in your quest.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-oo6gvm", "title": "Star Wars: The Force Unleashed", "genre": "Action", "platform": "Switch", "year": 2010, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/32500/header.jpg?t=1741729220", "desc": "The Star Wars® Saga continues with Star Wars®: The Force Unleashed™ II, the highly anticipated sequel to the fastest-selling Star Wars game ever created. In Star Wars: The Force Unleashed, the world was introduced to Darth Vader’s now fugitive apprentice, Starkiller—the unlikely hero who would ignite the flames of rebellion in a galaxy so desperately in need of a champion. In the sequel, Starkiller returns with over-the-top Force powers and embarks on a journey to discover his own identity and to reunite with his one true love, Juno Eclipse. In Star Wars: The Force Unleashed II, Starkiller is once again the pawn of Darth Vader—but instead of training his protégé as a ruthless assassin, the dark lord is attempting to clone his former apprentice in an attempt to create the Ultimate Sith warrior. The chase is on – Starkiller is in pursuit of Juno and Darth Vader is hunting for Starkiller. With all-new devastating Force powers and the ability to dual-wield lightsabers, Starkiller cuts a swath through deadly new enemies across exciting worlds from the Star Wars films - all in his desperate search for answers to his past. Key features: Continue the galaxy-altering journey of Starkiller,...", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-6psm1x", "title": "Stardew Valley", "genre": "Инди, Ролевые игры, Симуляторы", "platform": "Steam/Epic", "year": 2016, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/413150/header.jpg?t=1754692865", "desc": "Вам досталась старая дедушкина ферма в долине Стардью. С горстью монет в кармане и старыми инструментами в руках вы начинаете новую жизнь. Сможете ли вы превратить пустырь в цветущий сад? Это будет непросто. С тех пор, как в городе обосновалась корпорация Джоджа, всё сильно изменилось. Здание городского клуба заброшено. Тем не менее, в долине полно возможностей. Как знать... Может быть, именно вы вернете долине Стардью былое величие! --- Features Turn your overgrown field into a lively farm! Raise animals, grow crops, start an orchard, craft useful machines, and more! You'll have plenty of space to create the farm of your dreams. Improve your skills over time. As you make your way from a struggling greenhorn to a master farmer, you'll level up in 5 different areas: farming, mining, combat, fishing, and foraging. As you progress, you'll learn new cooking and crafting recipes, unlock new areas to explore, and customize your skills by choosing from a variety of professions. Become part of the local community. With over 30 unique characters living in Stardew Valley, you won't have a problem finding new friends! Each person has their own daily schedule, birthday, unique mini-cutscenes,...", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-cldbo9", "title": "Steep", "genre": "Казуальные игры, Бесплатные, Инди", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1543760/header.jpg?t=1614349032", "desc": "Steep Slopes is a snowboarding endless runner game! Attempt to gather the most amount of points by grinding ramps, hopping around, and jumping off ramps before you crash! Steep Slopes creates obstacles to either avoid or attempt to score points with. You can move between three lanes, jump in the air, and grind on logs. If you score a high score Steep Slopes will save that high score locally! This game contains sound effects and music, which you can mute in the settings menu. It also works on most resolutions by changing between three window sizes (small, medium, and large) in the settings menu.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-9mnqre", "title": "Stick it to the Man", "genre": "Экшены, Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2013, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/251830/header.jpg?t=1592572419", "desc": "В один обычный день один обычный испытатель защитных касок Рей попадает в нелепое происшествие. Утром он просыпается с длинной гибкой розовой рукой, торчащей прямо из его головы, и эта рука дает ему невероятные ментальные способности. Теперь Рей может резко изменять мир с помощью наклеек и преобразовывать свою бумажную вселенную, разрывая ее, складывая и используя найденные сумасшедшие наклейки (и свои новые невероятные силы), чтобы решать сложнейшие головоломки! К сожалению, у Рея не слишком много времени на то, чтобы привыкнуть к своим новоприобретенным способностям. Ему приходится бежать от \"Человека\" из-за преступления, которого он не совершал. Вы поможете Рею выбраться из такой непростой ситуации? Готовьтесь рвать, ломать и клеить на человека!", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-55utik", "title": "Stickman Killing Zombie", "genre": "Экшены, Приключенческие игры", "platform": "Steam/Epic", "year": 2024, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2792610/header.jpg?t=1776682916", "desc": "The world of stickmen has a zombie epidemic - you must kill all the stickmen zombies become the new stickman hero ( the last stickman hero saved the stick world from zombies 20 years ago - you see, this is pretty common in the stickman world). - Simple controls for running and killing: Supports gamepad as well as keyboard - 3D world with zombies - Ragdoll zombie deaths - Steam Achievements - Gameplay designed to get you \"in the flow.\" You can listen to audiobooks n stuff as you play. You never assumed your life as a stickman would get this violent.. but the world had other plans. You woke up and what you once loved became an infected cesspit. The city you once loved.. demeaned to this? You sigh as you get out your sword: this will be a long and bloody day. Now, good sir, no more time to speak! quick! Dash through the infected areas of Detroit and complete missions in the order you want.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-8vwtwd", "title": "Stranded Deep", "genre": "Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2022, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/313120/header.jpg?t=1776770148", "desc": "TEST YOUR SURVIVAL SKILLS IN THIS OPEN WORLD ADVENTURE In the aftermath of a mysterious plane crash, you are stranded in the vast expanse of the Pacific Ocean. Alone, without any means to call for help, you must do what you can to survive. BUILD. CRAFT. SURVIVE. ESCAPE. Explore underwater and on land as you hunt for supplies to craft the tools, weapons, and shelter you’ll need to stay alive. Stay sharp: hunger, thirst, and exposure conspire against you as you brave treacherous elements and the dangerous creatures of the Pacific. Live long enough, Stay Alive! Health, Hunger, Thirst, and sunstroke. Manage and monitor these vitals through an interactive survival watch. Cure poisons, heal broken bones, and bandage bleeding to stay alive. Spears, Axes, Bows, Spearguns, and so much more can all be crafted through an interactive crafting menu or by the quick-craft selection wheel. Items in your inventory and on the ground around you can all be crafted into something useful. Harvesting, Craftsmanship, Cooking, Physical, and Hunting can all be levelled up for maximum efficiency or to unlock different crafting combinations. With dozens of tiers and building pieces to choose from; craft your...", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-2q5x3h", "title": "Strange Horticulture", "genre": "Adventure, Indie, Simulation", "platform": "Steam/Epic", "year": 2022, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1574580/header.jpg?t=1772459223", "desc": "Ищите и изучайте растения, заботьтесь о коте, подружитесь с ведьмами или вступите в секту. Меняйте сюжет с помощью своей растущей коллекции и раскрывайте мрачные тайны Андермира. Добро пожаловать в Андермир — тихий городок в окружении дремучих лесов, населенных ведьмами, и непроходимых гор. Вы цветовод и владеете магазином «Загадочные растения», за прилавком которого вам предстоит познакомиться с местными жителями. Не успеете оглянуться, как они втянут вас в мистическую историю, уходящую корнями в глубокую древность. Исследуйте окружающие места в поисках новых растений. Только будьте осторожны! Темные леса и глубокие озера порой таят опасность для беззащитных ботаников. Вы можете открыть для себя немыслимую силу... или лишиться рассудка. Используйте подсказки, чтобы понять, куда лучше отправиться и где бывать не стоит. Богатый справочник и разные указания, найденные в путешествиях, помогут вам больше узнать о загадочных растениях. Определяйте их и открывайте свойства, которые способны повлиять на сюжет: это могут быть гипнотические галлюциногены или мощные яды.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-tqm72x", "title": "Stray", "genre": "Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2022, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1332010/71daca1910d664d31240b9623a495e0c0828807f/header.jpg?t=1779927784", "desc": "Потерявшемуся, одинокому, оторванному от семьи бродячему коту предстоит разгадать древнюю тайну и вырваться из давно заброшенного города. Stray – приключенческая игра от третьего лица, действие которой разворачивается на неоновых улочках и в угрюмых, грязных подворотнях гибнущего кибергорода. Блуждайте по подвалам и крышам, защищайтесь от неожиданных угроз и распутывайте загадки этого неприветливого места, где нет никого, кроме безучастных дроидов и опасных тварей. Посмотрите на мир глазами бродячего кота и взаимодействуйте с окружением самыми причудливыми способами. При встрече со странными обитателями этого чуждого мира вам предстоит быть незаметным, проворным, неблагоразумным, а порой и надоедливым. По пути ваш кот подружится с маленьким летающим дроном B-12. С помощью новообретенного друга вы непременно найдете выход из города. Игру Stray разработала BlueTwelve Studio – небольшая команда с юга Франции, состоящая главным образом из котов и нескольких людей в придачу.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-usxii2", "title": "Street Fighter", "genre": "Action", "platform": "Switch", "year": 2023, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2154900/header.jpg?t=1682492132", "desc": "Грядет новая эра файтингов! В демо-версии Street Fighter 6 игроки смогут впервые взглянуть на World Tour и режимы в Fighting Ground. *Battle Hub недоступен в этой демо-версии. *Прогресс World Tour не будет сохранен в этой демоверсии. Внешность вашего аватара будет сохранена и доступна для использования в полной версии игры для платформы, на которой вы играли в демоверсию.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-62siub", "title": "Strinova", "genre": "Экшены, Многопользовательские игры, Бесплатные", "platform": "Steam/Epic", "year": 2024, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1282270/0c161c5055d92ad260a0ade7ff68301163def869/header.jpg?t=1779331382", "desc": "Strinova — тактический соревновательный шутер от третьего лица в стиле аниме. Переключайтесь между трехмерной и двухмерной формами и наслаждайтесь необычной игрой с уникальной тактической системой стрельбы. Многомерный шутер Свободно переключайтесь между 2D и 3D-формами в многомерной вселенной Strinova, чтобы исследовать различные маршруты и стратегии боя, и наслаждайтесь уникальной системой стрельбы. Продвинутые тактические бои В Strinova есть многоуровневые карты, механизм струнификации, тактические навыки и разнообразные приспособления, создающие неповторимую систему командного боя. Еще больше новых карт и игровых режимов На различных картах представлены многочисленные режимы игры, включая Уничтожение и Бой насмерть. В будущем карт и режимов станет еще больше, так что наслаждайтесь сражениями и ждите новинок вместе с товарищами по команде! Уникальные суперструны Уникальные навыки и огнестрельное оружие делают каждую суперструну незаменимой. Нападающий, прорывающийся сквозь вражеские ряды, или защитник, оберегающий товарищей по команде, — в этой игре каждый найдет свое место, чтобы блистать на поле боя.", "createdAt": "2026-07-15T00:27:33.400Z"}, {"id": "1784075253400-g4tqpm", "title": "Stubbs the Zombie in Rebel Without a Pulse", "genre": "Action", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/7800/header.jpg?t=1680629661", "desc": "Be the Zombie. Kick A** and Take Brains It’s 1959 and the city of Punchbowl, PA, is a beacon of progress and ideal living. Show the living that law and order are no match for a dead man on a mission. Your boyfriend’s back Maggie, and Punchbowl is gonna be in trouble! Eat Brains Chomp on the living and replenish your bodily arsenal of: zombie sputum, gut grenades, and the stunning unholy flatulence Possess Punchbowl’s Population Clamp your severed hand to a barbershop quartet singer’s head and raygun away Build Your Zombie Horde Convert your enemies into undead allies & lead a zombie assault on the living Bring Civilization to its Knees Show the retro-futuristic city of Punchbowl, PA that they can’t escape the past Stubbs and Chill Invite a friend to play as Grubbs for classic couch havs, security guards, goths, weeaboos and haters appear on his way. But our EmoBoy will never surrender! With help of tears, literally, he smashes his way: plunge your enemies into shock by shooting them with your tears. You need to collect cigarettes in order to replenish your Jetpack stock! Your main companion and mentor is Girl with blue hair. She will not let you get bored and always will help you with advice on any trouble!", "createdAt": "2026-07-15T00:27:33.401Z"}, {"id": "1784075253401-mqhmeh", "title": "Wheels of Aurelia", "genre": "Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2016, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/508740/header.jpg?t=1727787641", "desc": "Дорожное приключение в кипучей Италии семидесятых годов расскажет историю Леллы, мятежной женщины, путешествующей по дорогам западного побережья Италии - знаменитой \"Аврелиевой дороге\". Эта игра - изометрическая гонка с возможностью многократного перепрохождения: каждый заход длится около пятнадцати минут, и вас ждет семнадцать различных концовок. Италия в 1970 гг. пережила волну терроризма, похищений и политических беспорядков. Все зависит только от вашего выбора. Вас ждут различные живописные места, погони, нелегальные уличные гонки, или же горячий спор с католическим священником, а также целая плеяда невероятных персонажей, которых вы вряд ли до этого встречали в видео играх.", "createdAt": "2026-07-15T00:27:33.401Z"}, {"id": "1784075253401-qyn4kg", "title": "Where The Water Tastes Like Wine", "genre": "Приключенческие игры, Инди, Ролевые игры", "platform": "Steam/Epic", "year": 2018, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/447120/header.jpg?t=1599638565", "desc": "Where The Water Tastes Like Wine — приключенческая игра с глубоким сюжетом, повествующая о путешествиях, жизни людей и борьбе с судьбой. Используя яркие рисованные иллюстрации, Where The Water Tastes Like Wine объ let filtered=[...GAMES], active={search:"", sort:"title-asc"};
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function applyFilters(){
  let out=[...GAMES];
  const q=active.search.toLowerCase().trim();
  if(q) out=out.filter(g=> (g.title+g.genre+g.platform).toLowerCase().includes(q));
  if(active.sort==='title-asc') out.sort((a,b)=>a.title.localeCompare(b.title));
  if(active.sort==='title-desc') out.sort((a,b)=>b.title.localeCompare(a.title));
  filtered=out; render();
}
let visibleCount=72;
function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const st=document.getElementById('statTotal'); if(st) st.textContent=GAMES.length;
  const stm=document.getElementById('statTotalMain'); if(stm) stm.textContent=GAMES.length;
  const sf=document.getElementById('statFiltered'); if(sf) sf.textContent=filtered.length;
  const sfMain=document.getElementById('statFilteredMain'); if(sfMain) sfMain.textContent=filtered.length;
  const sfm=document.getElementById('statFilteredMain'); if(sfm) sfm.textContent=filtered.length;
  const heroTotal=document.getElementById('heroTotal'); if(heroTotal) heroTotal.textContent=GAMES.length;
  const toShow=filtered.slice(0,visibleCount);
  if(!toShow.length){ grid.innerHTML=`<div class="empty"><h3>Ничего не нашлось</h3></div>`; return; }
  toShow.forEach(g=>{
    const el=document.createElement('div'); el.className='card';
    el.onclick=()=>{ document.getElementById('modalTitle').textContent=g.title; const img=document.getElementById('modalImg'); img.src=g.image||''; img.style.display=g.image?'block':'none'; document.getElementById('modalTags').innerHTML=`<span class="meta-tag accent">${esc(g.genre)}</span><span class="meta-tag">${esc(g.platform)}</span><span class="meta-tag">${g.year}</span>`; document.getElementById('modalDesc').textContent=g.desc||''; document.getElementById('modalBack').classList.add('open'); };
    const initials=g.title.slice(0,2).toUpperCase();
    const imgBlock=g.image ? `<img class="cover-bg" src="${esc(g.image)}" loading="lazy"><img class="cover-main" src="${esc(g.image)}" loading="lazy" alt="${esc(g.title)}" onerror="this.style.display='none'; this.previousElementSibling.style.display='none'"><div class="cover-fallback" style="display:none">${initials}</div>` : `<div class="cover-fallback">${initials}<small>${esc(g.title.slice(0,20))}</small></div>`;
    el.innerHTML=`<div class="card-cover">${imgBlock}<div class="rating-badge">★ ${g.rating}</div></div><div class="card-body"><div class="card-title">${esc(g.title)}</div><div class="card-meta"><span class="meta-tag accent">${esc(g.genre.split(',')[0])}</span><span class="meta-tag">${g.year}</span></div></div>`;
    grid.appendChild(el);
  });
  if(filtered.length>visibleCount){
    const more=document.createElement('div'); more.style.gridColumn='1 / -1'; more.style.textAlign='center'; more.style.padding='20px';
    more.innerHTML=`<button class="btn" style="height:44px; padding:0 22px; border-radius:999px; background:var(--text); color:var(--bg); font-weight:800" onclick="visibleCount+=72; render();">Показать ещё 72 (${visibleCount} / ${filtered.length})</button>`;
    grid.appendChild(more);
  }
}
function closeModal(){ document.getElementById('modalBack').classList.remove('open'); }
document.getElementById('modalBack').addEventListener('click',e=>{ if(e.target.id==='modalBack') closeModal(); });
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('searchInput').addEventListener('input',e=>{ active.search=e.target.value; visibleCount=72; applyFilters(); });
document.getElementById('sortSelect').addEventListener('change',e=>{ active.sort=e.target.value; visibleCount=72; applyFilters(); });
applyFilters();
</script>
</body>
</html>
