<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mikkleo Games</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Nunito:wght@800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070D1A; --bg2:#0C1324; --card:#111A2D; --card2:#16213A; --border:#1E2F4A; --border2:#263A5A;
  --text:#EEF6FF; --muted:#8AA0BF; --muted2:#5E789E;
  --accent:#6BE7FF; --accent2:#7CFFB2; --accent3:#8AB4FF;
  --r2:22px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg); color:var(--text); font-family:'Manrope',system-ui,sans-serif; min-height:100vh; overflow-x:hidden}
body::before{content:''; position:fixed; inset:0; background:
  radial-gradient(900px 600px at 18% -5%, rgba(107,231,255,.20), transparent 65%),
  radial-gradient(700px 500px at 90% 5%, rgba(124,255,178,.14), transparent 60%),
  radial-gradient(800px 600px at 50% 115%, rgba(138,180,255,.16), transparent 70%);
  pointer-events:none; z-index:-1}
.mono{font-family:'JetBrains Mono',monospace}
.header{position:sticky; top:0; z-index:50; backdrop-filter:blur(22px); background:rgba(7,13,26,.82); border-bottom:1px solid var(--border)}
.header-inner{max-width:1440px; margin:0 auto; padding:18px 28px; display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap}
.logo{display:flex; align-items:center; gap:12px; font-family:'Nunito',sans-serif; font-weight:900; font-size:22px; letter-spacing:-.03em}
.logo-mark{width:42px; height:42px; border-radius:13px; background:linear-gradient(135deg, var(--accent), var(--accent3)); display:grid; place-items:center; color:#04101A; font-size:20px; font-weight:900; box-shadow:0 0 24px rgba(107,231,255,.35)}
.logo-sub{font-size:10px; margin-left:10px; background:rgba(107,231,255,.14); border:1px solid rgba(107,231,255,.28); padding:4px 10px; border-radius:999px; color:var(--accent); letter-spacing:.08em}
.search-wrap{position:relative; width:min(480px,100%)}
.search-wrap input{width:100%; height:46px; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:0 18px 0 48px; color:var(--text); font-size:15px; outline:none; transition:.2s}
.search-wrap input:focus{border-color:var(--accent); box-shadow:0 0 0 4px rgba(107,231,255,.13)}
.search-wrap svg{position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--accent); opacity:.7}
.wrap{max-width:1440px; margin:0 auto; padding:28px; display:grid; grid-template-columns:300px 1fr; gap:28px}
@media(max-width:1024px){.wrap{grid-template-columns:1fr}}
.sidebar{position:sticky; top:88px; align-self:start; background:rgba(17,26,45,.72); border:1px solid var(--border); border-radius:22px; padding:22px; backdrop-filter:blur(18px)}
.side-title{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:12px}
.stats{background:linear-gradient(135deg, rgba(107,231,255,.16), rgba(124,255,178,.10)); border:1px solid rgba(107,231,255,.22); border-radius:16px; padding:16px; display:flex; justify-content:space-between}
.stat-val{font-family:'Nunito',sans-serif; font-size:24px; font-weight:900}
.stat-lab{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-top:4px}
.main-head{display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; margin-bottom:20px}
.main-head h2{font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; letter-spacing:-.02em}
.sort-select{height:42px; padding:0 16px; border-radius:999px; background:var(--card); border:1px solid var(--border); color:var(--text); font-size:14px; font-weight:600; outline:none}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:22px}
.card{background:var(--card); border:1px solid var(--border); border-radius:24px; overflow:hidden; transition:.32s cubic-bezier(.2,.8,.2,1); position:relative; cursor:pointer; box-shadow:0 12px 32px rgba(0,0,0,.22)}
.card:hover{transform:translateY(-6px); border-color:rgba(107,231,255,.35); box-shadow:0 24px 60px rgba(0,0,0,.45), 0 0 0 1px rgba(107,231,255,.10) inset}
.card-cover{height:380px; position:relative; overflow:hidden; background:radial-gradient(600px 400px at 50% 0%, #1C2A44, #0F1628); display:grid; place-items:center; isolation:isolate}
.card-cover .cover-bg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:blur(30px) brightness(.6) saturate(1.3); transform:scale(1.3); opacity:.85; z-index:0}
.card-cover .cover-main{position:relative; z-index:1; width:100%; height:100%; object-fit:contain; object-position:center; transition:.45s; filter:drop-shadow(0 12px 28px rgba(0,0,0,.55))}
.card:hover .cover-main{transform:scale(1.05)}
.card-cover::after{content:''; position:absolute; inset:0; z-index:2; background:linear-gradient(to top, var(--card) 6%, rgba(17,26,45,0) 45%, rgba(0,0,0,.12) 100%); pointer-events:none}
.cover-fallback{position:relative; z-index:1; font-family:'Nunito',sans-serif; font-size:58px; font-weight:900; color:var(--accent); opacity:.18; text-align:center; padding:24px}
.cover-fallback small{display:block; font-size:11px; font-family:'Manrope'; letter-spacing:.12em; color:var(--muted); margin-top:12px}
.rating-badge{position:absolute; top:14px; right:14px; z-index:3; background:rgba(7,13,26,.88); backdrop-filter:blur(12px); border:1px solid rgba(107,231,255,.28); padding:6px 11px; border-radius:999px; font-family:'JetBrains Mono'; font-size:11px; color:var(--accent2); font-weight:700; box-shadow:0 6px 16px rgba(0,0,0,.35)}
.badge-snow{position:absolute; top:14px; left:14px; z-index:3; width:38px; height:38px; border-radius:12px; display:grid; place-items:center; background:rgba(7,13,26,.72); border:1px solid rgba(107,231,255,.28); backdrop-filter:blur(10px); box-shadow:0 4px 12px rgba(0,0,0,.25); overflow:hidden; padding:4px}
.badge-snow img{width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(107,231,255,.6))}
.card-body{padding:16px 16px 14px; background:var(--card)}
.card-title{font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; line-height:1.25; min-height:44px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; letter-spacing:-.01em}
.card-meta{display:flex; gap:6px; margin-top:10px; flex-wrap:wrap}
.meta-tag{font-size:11px; font-weight:700; padding:5px 11px; border-radius:999px; background:var(--card2); border:1px solid var(--border); color:var(--muted)}
.meta-tag.accent{color:var(--accent); background:rgba(107,231,255,.13); border-color:rgba(107,231,255,.28)}
.empty{grid-column:1/-1; padding:80px 20px; text-align:center; background:var(--card); border:1px dashed var(--border2); border-radius:22px}
.modal-back{position:fixed; inset:0; background:rgba(0,0,0,.68); backdrop-filter:blur(16px); display:none; place-items:center; z-index:100; padding:20px}
.modal-back.open{display:grid}
.modal{width:min(760px,100%); max-height:92vh; overflow:auto; background:linear-gradient(180deg,var(--card2),var(--card)); border:1px solid var(--border2); border-radius:26px; box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-cover{height:440px; position:relative; background:#0A0F1D; overflow:hidden}
.modal-cover img{width:100%; height:100%; object-fit:contain; background:radial-gradient(600px 400px at 50% 0%, rgba(107,231,255,.15), transparent)}
.modal-close{position:absolute; top:16px; right:16px; z-index:4; width:40px; height:40px; border-radius:999px; background:rgba(7,13,26,.7); border:1px solid rgba(255,255,255,.14); color:#fff; display:grid; place-items:center; cursor:pointer; backdrop-filter:blur(8px)}
.modal-body{padding:24px 28px}
.modal-title{font-family:'Nunito',sans-serif; font-size:26px; font-weight:900; margin-bottom:12px}
</style>
</head>
<body>
<header class="header">
  <div class="header-inner">
    <div class="logo"><div class="logo-mark">M</div><span>MIKKLEO GAMES</span></div>
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="6"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="searchInput" placeholder="Поиск по названию игр..." autocomplete="off">
    </div>
  </div>
</header>


<div style="max-width:1440px; margin:0 auto; padding:36px 28px 0; display:flex; flex-direction:column; align-items:center; text-align:center">
  <div style="background:linear-gradient(135deg, rgba(107,231,255,.14), rgba(138,180,255,.10)); border:2px solid rgba(107,231,255,.26); border-radius:24px; padding:18px 26px; display:flex; gap:16px; align-items:center; box-shadow:0 12px 32px rgba(0,150,180,.12); backdrop-filter:blur(12px)">
    <img src="https://static-cdn.jtvnw.net/jtv_user_pictures/b8489b38-68e8-4220-b257-b451f26cf0c9-profile_image-300x300.png" style="width:96px; height:96px; border-radius:22px; object-fit:cover; border:2px solid rgba(107,231,255,.4); box-shadow:0 8px 24px rgba(107,231,255,.25)" alt="MikkleoVT">
    <div style="text-align:left">
      <div style="font-family:'Nunito',sans-serif; font-weight:900; font-size:22px">MikkleoVT</div>
      <div style="font-size:12px; color:var(--muted); margin-top:3px">Коллекция • 848 игр</div>
    </div>
  </div>
  <h1 style="font-family:'Nunito',sans-serif; font-size:52px; font-weight:900; letter-spacing:-.04em; line-height:.95; color:var(--text); text-align:center; margin:24px 0 8px">Моя коллекция игр</h1>
</div>

<div class="wrap">

  <aside class="sidebar">
    <div class="stats" style="margin-bottom:18px">
      <div><div class="stat-val mono" id="statTotal">0</div><div style="font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-top:4px">Всего игр</div></div>
      <div style="text-align:right"><div class="stat-val mono" id="statFiltered">0</div><div style="font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-top:4px">Показано</div></div>
    </div>
    <div style="background:var(--card2); border:1px solid var(--border); border-radius:14px; padding:12px; font-size:11.5px; color:var(--muted2); line-height:1.5" class="mono">
      Публичная версия • только поиск<br>Для редактирования открой <code>admin.html</code>
    </div>
  </aside>

  <main>
    <div class="main-head" style="justify-content:flex-end; margin-bottom:10px">
      <select id="sortSelect" class="sort-select">
        <option value="title-asc">A → Z</option>
        <option value="title-desc">Z → A</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<div class="modal-back" id="modalBack">
  <div class="modal">
    <div class="modal-cover"><button class="modal-close" id="modalClose">✕</button><img id="modalImg" alt=""></div>
    <div class="modal-body"><div class="modal-title" id="modalTitle"></div><div id="modalTags" class="modal-tags" style="display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px"></div><p id="modalDesc" class="modal-desc" style="color:#9BB2CD; line-height:1.6"></p></div>
  </div>
</div>

<script>
const GAMES = [
  {"title":"The Witcher 3: Wild Hunt","genre":"RPG","platform":"PC, PS5, Xbox","year":2015,"rating":93,"image":"https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600","desc":"Эпическое приключение Геральта. Открытый мир, сотни квестов."},
  {"title":"Elden Ring","genre":"Action RPG","platform":"PC, PS5","year":2022,"rating":96,"image":"https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600","desc":"Мир от FromSoftware и Джорджа Мартина."},
  {"title":"Baldur's Gate 3","genre":"RPG","platform":"PC, PS5","year":2023,"rating":97,"image":"https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=600","desc":"D&D в лучшей форме."},
  {"title":"Cyberpunk 2077","genre":"RPG, FPS","platform":"PC, PS5, Xbox","year":2020,"rating":86,"image":"https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=600","desc":"Найт-Сити ждет."}
];
let filtered=[...GAMES], active={search:"", sort:"title-asc"};
function esc(s){ return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
function applyFilters(){
  let out=[...GAMES];
  const q=active.search.toLowerCase().trim();
  if(q) out=out.filter(g=> (g.title+g.genre+g.platform).toLowerCase().includes(q));
  if(active.sort==='title-asc') out.sort((a,b)=>a.title.localeCompare(b.title));
  if(active.sort==='title-desc') out.sort((a,b)=>b.title.localeCompare(a.title));
  filtered=out; render();
}
let visibleCount=72;
function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  document.getElementById('statTotal').textContent=GAMES.length;
  document.getElementById('statFiltered').textContent=filtered.length;
  const heroTotal=document.getElementById('heroTotal'); if(heroTotal) heroTotal.textContent=GAMES.length;
  const toShow=filtered.slice(0,visibleCount);
  if(!toShow.length){ grid.innerHTML=`<div class="empty"><h3>Ничего не нашлось</h3></div>`; return; }
  toShow.forEach(g=>{
    const el=document.createElement('div'); el.className='card';
    el.onclick=()=>{ document.getElementById('modalTitle').textContent=g.title; const img=document.getElementById('modalImg'); img.src=g.image||''; img.style.display=g.image?'block':'none'; document.getElementById('modalTags').innerHTML=`<span class="meta-tag accent">${esc(g.genre)}</span><span class="meta-tag">${esc(g.platform)}</span><span class="meta-tag">${g.year}</span>`; document.getElementById('modalDesc').textContent=g.desc||''; document.getElementById('modalBack').classList.add('open'); };
    const initials=g.title.slice(0,2).toUpperCase();
    const imgBlock=g.image ? `<img class="cover-bg" src="${esc(g.image)}" loading="lazy"><img class="cover-main" src="${esc(g.image)}" loading="lazy" alt="${esc(g.title)}" onerror="this.style.display='none'; this.previousElementSibling.style.display='none'"><div class="cover-fallback" style="display:none">${initials}</div>` : `<div class="cover-fallback">${initials}<small>${esc(g.title.slice(0,20))}</small></div>`;
    el.innerHTML=`<div class="card-cover">${imgBlock}<div class="rating-badge">★ ${g.rating}</div></div><div class="card-body"><div class="card-title">${esc(g.title)}</div><div class="card-meta"><span class="meta-tag accent">${esc(g.genre.split(',')[0])}</span><span class="meta-tag">${g.year}</span></div></div>`;
    grid.appendChild(el);
  });
  if(filtered.length>visibleCount){
    const more=document.createElement('div'); more.style.gridColumn='1 / -1'; more.style.textAlign='center'; more.style.padding='20px';
    more.innerHTML=`<button class="btn" style="height:44px; padding:0 22px; border-radius:999px; background:var(--text); color:var(--bg); font-weight:800" onclick="visibleCount+=72; render();">Показать ещё 72 (${visibleCount} / ${filtered.length})</button>`;
    grid.appendChild(more);
  }
}
function closeModal(){ document.getElementById('modalBack').classList.remove('open'); }
document.getElementById('modalBack').addEventListener('click',e=>{ if(e.target.id==='modalBack') closeModal(); });
document.getElementById('modalClose').onclick=closeModal;
document.getElementById('searchInput').addEventListener('input',e=>{ active.search=e.target.value; visibleCount=72; applyFilters(); });
document.getElementById('sortSelect').addEventListener('change',e=>{ active.sort=e.target.value; visibleCount=72; applyFilters(); });
applyFilters();
</script>
</body>
</html>
