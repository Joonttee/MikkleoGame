<head>

<title>Mikkleo Games — 837 игр</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Nunito:wght@800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070D1A; --bg2:#0C1324; --card:#111A2D; --card2:#16213A; --border:#1E2F4A; --border2:#263A5A;
  --text:#EEF6FF; --muted:#8AA0BF; --muted2:#5E789E;
  --accent:#6BE7FF; --accent2:#7CFFB2; --accent3:#8AB4FF;
  --r2:22px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg); color:var(--text); font-family:'Manrope',system-ui,sans-serif; min-height:100vh; overflow-x:hidden}
body::before{content:''; position:fixed; inset:0; background:
  radial-gradient(900px 600px at 18% -5%, rgba(107,231,255,.20), transparent 65%),
  radial-gradient(700px 500px at 90% 5%, rgba(124,255,178,.14), transparent 60%),
  radial-gradient(800px 600px at 50% 115%, rgba(138,180,255,.16), transparent 70%);
  pointer-events:none; z-index:-1}
.mono{font-family:'JetBrains Mono',monospace}
.header{position:sticky; top:0; z-index:50; backdrop-filter:blur(22px); background:rgba(7,13,26,.82); border-bottom:1px solid var(--border)}
.header-inner{max-width:1440px; margin:0 auto; padding:18px 28px; display:flex; align-items:center; justify-content:space-between; gap:18px; flex-wrap:wrap}
.logo{display:flex; align-items:center; gap:12px; font-family:'Nunito',sans-serif; font-weight:900; font-size:22px; letter-spacing:-.03em}
.logo-mark{width:42px; height:42px; border-radius:13px; background:linear-gradient(135deg, var(--accent), var(--accent3)); display:grid; place-items:center; color:#04101A; font-size:20px; font-weight:900; box-shadow:0 0 24px rgba(107,231,255,.35)}
.logo-sub{font-size:10px; margin-left:10px; background:rgba(107,231,255,.14); border:1px solid rgba(107,231,255,.28); padding:4px 10px; border-radius:999px; color:var(--accent); letter-spacing:.08em}
.search-wrap{position:relative; width:min(480px,100%)}
.search-wrap input{width:100%; height:46px; background:var(--card); border:1px solid var(--border); border-radius:999px; padding:0 18px 0 48px; color:var(--text); font-size:15px; outline:none; transition:.2s}
.search-wrap input:focus{border-color:var(--accent); box-shadow:0 0 0 4px rgba(107,231,255,.13)}
.search-wrap svg{position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--accent); opacity:.7}
.wrap{max-width:1440px; margin:0 auto; padding:28px; display:grid; grid-template-columns:300px 1fr; gap:28px}
@media(max-width:1024px){.wrap{grid-template-columns:1fr}}
.sidebar{position:sticky; top:88px; align-self:start; background:rgba(17,26,45,.72); border:1px solid var(--border); border-radius:22px; padding:22px; backdrop-filter:blur(18px)}
.side-title{font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:12px}
.stats{background:linear-gradient(135deg, rgba(107,231,255,.16), rgba(124,255,178,.10)); border:1px solid rgba(107,231,255,.22); border-radius:16px; padding:16px; display:flex; justify-content:space-between}
.stat-val{font-family:'Nunito',sans-serif; font-size:24px; font-weight:900}
.stat-lab{font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin-top:4px}
.main-head{display:flex; flex-wrap:wrap; gap:12px; align-items:center; justify-content:space-between; margin-bottom:20px}
.main-head h2{font-family:'Nunito',sans-serif; font-size:22px; font-weight:900; letter-spacing:-.02em}
.sort-select{height:42px; padding:0 16px; border-radius:999px; background:var(--card); border:1px solid var(--border); color:var(--text); font-size:14px; font-weight:600; outline:none}
.grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:22px}
.card{background:var(--card); border:1px solid var(--border); border-radius:24px; overflow:hidden; transition:.32s cubic-bezier(.2,.8,.2,1); position:relative; cursor:pointer; box-shadow:0 12px 32px rgba(0,0,0,.22)}
.card:hover{transform:translateY(-6px); border-color:rgba(107,231,255,.35); box-shadow:0 24px 60px rgba(0,0,0,.45), 0 0 0 1px rgba(107,231,255,.10) inset}
.card-cover{height:380px; position:relative; overflow:hidden; background:radial-gradient(600px 400px at 50% 0%, #1C2A44, #0F1628); display:grid; place-items:center; isolation:isolate}
.card-cover .cover-bg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:blur(30px) brightness(.6) saturate(1.3); transform:scale(1.3); opacity:.85; z-index:0}
.card-cover .cover-main{position:relative; z-index:1; width:100%; height:100%; object-fit:contain; object-position:center; transition:.45s; filter:drop-shadow(0 12px 28px rgba(0,0,0,.55))}
.card:hover .cover-main{transform:scale(1.05)}
.card-cover::after{content:''; position:absolute; inset:0; z-index:2; background:linear-gradient(to top, var(--card) 6%, rgba(17,26,45,0) 45%, rgba(0,0,0,.12) 100%); pointer-events:none}
.cover-fallback{position:relative; z-index:1; font-family:'Nunito',sans-serif; font-size:58px; font-weight:900; color:var(--accent); opacity:.18; text-align:center; padding:24px}
.cover-fallback small{display:block; font-size:11px; font-family:'Manrope'; letter-spacing:.12em; color:var(--muted); margin-top:12px}
.rating-badge{position:absolute; top:14px; right:14px; z-index:3; background:rgba(7,13,26,.88); backdrop-filter:blur(12px); border:1px solid rgba(107,231,255,.28); padding:6px 11px; border-radius:999px; font-family:'JetBrains Mono'; font-size:11px; color:var(--accent2); font-weight:700; box-shadow:0 6px 16px rgba(0,0,0,.35)}
.badge-snow{position:absolute; top:14px; left:14px; z-index:3; width:38px; height:38px; border-radius:12px; display:grid; place-items:center; background:rgba(7,13,26,.72); border:1px solid rgba(107,231,255,.28); backdrop-filter:blur(10px); box-shadow:0 4px 12px rgba(0,0,0,.25); overflow:hidden; padding:4px}
.badge-snow img{width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 2px 6px rgba(107,231,255,.6))}
.card-body{padding:16px 16px 14px; background:var(--card)}
.card-title{font-family:'Nunito',sans-serif; font-size:16px; font-weight:800; line-height:1.25; min-height:44px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; letter-spacing:-.01em}
.card-meta{display:flex; gap:6px; margin-top:10px; flex-wrap:wrap}
.meta-tag{font-size:11px; font-weight:700; padding:5px 11px; border-radius:999px; background:var(--card2); border:1px solid var(--border); color:var(--muted)}
.meta-tag.accent{color:var(--accent); background:rgba(107,231,255,.13); border-color:rgba(107,231,255,.28)}
.empty{grid-column:1/-1; padding:80px 20px; text-align:center; background:var(--card); border:1px dashed var(--border2); border-radius:22px}
.modal-back{position:fixed; inset:0; background:rgba(0,0,0,.68); backdrop-filter:blur(16px); display:none; place-items:center; z-index:100; padding:20px}
.modal-back.open{display:grid}
.modal{width:min(760px,100%); max-height:92vh; display:flex; flex-direction:column; overflow:hidden; background:linear-gradient(180deg,var(--card2),var(--card)); border:1px solid var(--border2); border-radius:26px; box-shadow:0 30px 80px rgba(0,0,0,.6)}
.modal-cover{height:380px; position:relative; background:#0A1020; overflow:hidden; flex-shrink:0}
.modal-cover img{width:100%; height:100%; object-fit:contain; background:radial-gradient(600px 400px at 50% 0%, rgba(107,231,255,.15), transparent)}
.modal-close{position:absolute; top:16px; right:16px; z-index:4; width:40px; height:40px; border-radius:999px; background:rgba(7,13,26,.7); border:1px solid rgba(255,255,255,.14); color:#fff; display:grid; place-items:center; cursor:pointer; backdrop-filter:blur(8px)}
.modal-body{padding:22px 24px 24px; overflow-y:auto; flex:1; min-height:0}
.modal-title{flex-shrink:0;font-family:'Nunito',sans-serif; font-size:26px; font-weight:900; margin-bottom:12px}
.modal-desc{color:#C2D4E8; line-height:1.7; font-size:14.5px; white-space:pre-wrap; word-break:break-word; max-height:none; overflow:visible}
</style>

<script>
const GAMES = [{"id": "1784075253393-qyr1mj", "title": "10 Second Ninja X", "genre": "Экшены, Инди", "platform": "Steam/Epic", "year": 2016, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/435790/header.jpg?t=1747738084", "desc": "10 SECOND NINJA X - невероятно быстрая и потрясающе динамичная игра. Злой капитан Большебород похитил вас и заточил ваших лесных друзей внутри своей армии роботов. Он не верит, что вы самый быстрый ниндзя всех времен. И ЗРЯ. Ваша цель - уничтожать всех роботов на уровнях, укладываясь в 10 секунд.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-zmion6", "title": "100% Orange Juice", "genre": "Инди, Стратегии", "platform": "Steam/Epic", "year": 2014, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/282800/74b8f808c2ea623f9aee9ed20c6d76c7e536e137/header.jpg?t=1779180569", "desc": "100% Orange Juice is a digital multiplayer board game populated by developer Orange Juice's all-star cast. Characters from Flying Red Barrel, QP Shooting, Suguri and Sora come together with all-new characters to duke it out... with dice. This is a world where dogs, people and machines fly through the air. In that world, a small patch of darkness was born. Infinitesimal at first, it gradually began to envelop everything.. A youth named Kai, led by the mysterious life form known as Marie Poppo, begins a journey that will span worlds. The black, bottomless darkness of desire slowly eats away at both Kai and the world itself... Let Marie Poppo lead you into a mysterious world to play. Grab your deck of cards and let the games begin! Features: Dice, cards, stars, battles and pudding 4 Single-player campaigns Playable by up to 4 players online Countless battle combinations Utilize each character's unique combat attributes More than 50 different cards to collect Character abilities in the...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-tzsdob", "title": "12 is Better Than 6", "genre": "Экшены, Инди", "platform": "Switch", "year": 2015, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/410110/header.jpg?t=1770219342", "desc": "1873 год - времена беззакония и жестокости на Диком Западе. Ты сбежал с каторги и направляешься в Техас. Но держи пушку наготове, ведь за твою голову объявлена крупная награда и наемники пойдут на все, чтобы остановить тебя. Ключевые особенности: Высокая сложность Пули разлетаются в стороны, а бесчисленные враги не раздумывают перед выстрелом Аутентичное оружие Используй реальное оружие, чтобы достичь своих целей. Винтовка, двуствольное оружие, револьвер, лук и даже пулемёт системы Гатлинга Локации Реальные города - Сан-Антонио, Альбукерке и Хьюстон, индейские поселения, дух пустыни и самые отчаянные бандитос передают атмосферу настоящего Дикого Запада Выбор стиля Стелс-элементы дают тебе право выбора, ведь не всегда есть желание рисковать своей жизнью. Большую часть игры можно пройти, оставаясь незамеченным. Путь выбираешь только ты Захватывающая история Более шести часов сюжетной кампании о путешествии сбежавшего мексиканского каторжника, который борется за выживание и свободу в...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-0p0leh", "title": "20 Minutes Till Dawn", "genre": "Экшены, Приключенческие игры, Казуальные игры", "platform": "Steam/Epic", "year": 2023, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1966900/header.jpg?t=1779189556", "desc": "Попробуй выжить 20 минут под бесконечно растущем натиском наступающих монстров! Уникальный билд в каждом забеге Это игра на выживание в жанре Roguelite (Рогалик). Здесь ты сможешь выбрать из множества улучшений, чтобы создать уникальный билд для каждой игры. Ты можешь стать огненным магом, поджигая толпы врагов выстрелами из шотгана или неуловимым ниндзя, управляющим летающими кинжалами — все в твоих руках. Выбери своего героя Широкий выбор персонажей и оружия предоставляет самые разнообразные игровые возможности. Особенности Более 50 различных апгрейдов на выбор для получения уникальных впечатлений при каждом прохождении! Широкий список персонажей, который будет расширяться в последующих обновлениях.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-4gad9b", "title": "200% Mixed Juice!", "genre": "Приключенческие игры, Инди, Ролевые игры", "platform": "Steam/Epic", "year": 2015, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/335190/header.jpg?t=1729154276", "desc": "200% Mixed Juice! is the 10th Anniversary game of OrangeJuice, an old school RPG featuring a 200% mix of OrangeJuice characters. At certain points in time and space, many fun worlds exist. Each world was created by a smart little fairy named Navi for the sake of the sleeping princess with nothing to do. A world where you're able to experience a lively school life. A world where you can see the skies crowded with airplanes. A world that has fallen to ruin from endless wars... It's time for the sleeping princess to wake up and start her adventures in those worlds. Features: Over 80 characters to do battle with Cutting-edge graphics to amaze your friends and neighbors with A stunning digital soundtrack Online multiplayer", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-76wxal", "title": "20XX", "genre": "Экшены, Инди", "platform": "Steam/Epic", "year": 2017, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/322110/header.jpg?t=1588889694", "desc": "Любите бродилки или игру Mega Man? Тогда 20ХХ для вас! 20XX — аркадная игра-бродилка, в которой можно отправиться на приключения с другом. Прыгайте и стреляйте, чтобы продвинуться вперед, получайте новые способности и сражайтесь с могущественными боссами во имя спасения человеческой расы! 20ХХ также предусматривает совместную игру. Сражайтесь вместе с другом по локальной сети или по Интернету! 20XX поддерживает 1-2 игроков по локальной сети или через Steam в Интернете.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-gtgihj", "title": "3 out of 10, EP 1: \"Welcome To Shovelworks\"", "genre": "Adventure", "platform": "Steam/Epic", "year": 2020, "rating": 80, "image": "https://media.rawg.io/media/screenshots/d43/d43f4c204c3991d16896720dde04b1d8.jpg", "desc": "", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-dchqrq", "title": "3 out of 10, EP 4: \"Thank You For Being An Asset\"", "genre": "Adventure", "platform": "Steam/Epic", "year": 2020, "rating": 80, "image": "https://media.rawg.io/media/screenshots/d43/d43f4c204c3991d16896720dde04b1d8.jpg", "desc": "", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-49q0qs", "title": "3 out of 10: Season Two", "genre": "Adventure", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://upload.wikimedia.org/wikipedia/en/c/c4/3_out_of_10_game_cover.png", "desc": "", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-e60o1v", "title": "8AM", "genre": "Казуальные игры, Инди", "platform": "Steam/Epic", "year": 2024, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2835590/header.jpg?t=1781547073", "desc": "\"8AM\" plunges the player into an enigmatic and tense game of observation and decision under an unfathomable veil of mystery. In this game, you find yourself in a stark room, devoid of any memory or knowledge of your purpose or how you arrived there. The only companions in your solitary vigil are a set of devices and a computer, your window to the outside world, connecting you exclusively to the security camera system of a seemingly ordinary house. The house is inhabited by a family whose life appears to proceed normally until the clock strikes midnight. From that moment, as the hours slip towards dawn, you become a witness to a series of events that could be classified as ordinary or deeply disturbing. The nature of these occurrences varies widely, from ghostly figures slipping through the corridors in the darkness, manifestations of paranormal activity that defy all logic, to the strange behaviors of the family members, like sleepwalking, which could hide something more sinister....", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-2vk6q5", "title": "911 Operator", "genre": "Казуальные игры, Инди, Симуляторы", "platform": "Steam/Epic", "year": 2017, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/503560/2e5e6b78b36586e2a8fc7e0fa3bf80dc5a94a6fb/header.jpg?t=1783934980", "desc": "В 911 OPERATOR вы возьмёте на себя роль диспетчера экстренных служб, который обязан быстро реагировать на поступающие сообщения. Ваша задача состоит не только в том, чтобы принимать звонки, но и в надлежайшем реагировании на них - порой достаточно лишь дать указания по оказанию первой помощи, в иных случаях требуется направить отряды полиции, пожарных или медиков на место происшествия. Не стоит забывать о том, что человек по ту сторону провода может быть как убитым горем отцом, так и непредсказуемым террористом или шутником. По зубам ли вам такая работа? ИГРАЙТЕ В ЛЮБОМ ГОРОДЕ МИРА* Побывайте в любом из тысяч городов мира. Режим свободной игры позволит вам выбрать любой город - игра автоматически загрузит карту с реальными названиями улиц, адресами и инфраструктурой служб безопасности. Вы также можете пройти режим карьеры, включающий в себя 6 городов с самыми различными происшествиями: переживите землетрясение в Сан-Франциско и спасите Вашингтон от террористических атак. УПРАВЛЯЙТЕ...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-ubcp5s", "title": "A Plague Tale: Innocence", "genre": "Экшены, Приключенческие игры", "platform": "Steam/Epic", "year": 2019, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/752590/header.jpg?t=1727793332", "desc": "Отправляйтесь в путешествие вместе с Амицией и ее младшим братом Гуго. Преследуемые Инквизицией и ордами крыс, дети пытаются найти свое место в жестоком мире средневековой Франции. 1348 год. Черная смерть опустошает Францию. Амиция и ее младший брат Гуго спасаются от Инквизиции в разоренном чумой краю. Чтобы уйти от погони и огнем и светом разогнать полчища крыс, героям придется объединить силы с другими подростками. И только узы дружбы помогут им преодолеть немыслимые ужасы, которые ждут их на пути. В борьбе за жизнь... нет места невинности.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-64tj7d", "title": "A Short Hike", "genre": "Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2019, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1055540/header.jpg?t=1777758958", "desc": "Hike, climb, and soar through the peaceful mountainside landscapes of Hawk Peak Provincial Park. Follow the marked trails or explore the backcountry as you make your way to the summit. Along the way, meet other hikers, discover hidden treasures, and take in the world around you. Key Features Explore the island any way you like. Choose your own path to follow and see where it leads you. You never know what you might stumble into! Hike at your own pace — there’s no need to rush to the summit! Take your time fishing along the river banks or swimming by the lakeshore. Collect hidden treasures to reach new heights. Try taking a dive off the mountain peaks to soar above the forests. Chat with the other hikers you meet along your route. You might be able to help each other out! Listen to a lush original soundtrack by Mark Sparling that progresses dynamically as you explore the wilderness.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-ssammb", "title": "A Story About My Uncle", "genre": "Приключенческие игры, Казуальные игры, Инди", "platform": "Steam/Epic", "year": 2014, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/278360/header.jpg?t=1589403981", "desc": "A Story About My Uncle - это приключенческий платформер от первого лица о мальчике, который ищет своего пропавшего дядю и попадает в мир, существование которого он не мог себе даже вообразить. Используйте таинственные изобретения вашего дяди, которые предоставят вам возможность невероятно высоко и далеко прыгать, созерцая красивые пейзажи. Найдите зацепки, указывающие на местонахождение вашего дяди, и встретьте невероятных существ, которые помогут вам в вашем путешествии. Движение в A Story About My Uncle является важнейшей частью геймплея. Акцент делается на передвижениях по миру с помощью силового крюка, который предоставляет игроку невероятное ощущение скорости и свободы. Поприветствуйте игровой мир с уникальным визуальным стилем и загадочной историей, которая развернется перед вами. Ключевые особенности Силовой крюк: Расширяет возможности игровой механики и предоставляет вам ощущение скорости и головокружительного полета, которое вы еще не испытывали. Исследуйте мир: Посетите...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-o631or", "title": "A Total War Saga: TROY", "genre": "Action, Simulation, Strategy", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1099410/header.jpg?t=1763642600", "desc": "In this legendary age, heroes walk the earth. In an act that shocks the world, audacious Paris, prince of Troy, elopes with the beautiful queen of Sparta. As they sail away, King Menelaus curses her name. He vows to bring his wife home – whatever the cost. Fight to save or conquer the kingdom of Troy as one of eight iconic heroes, including the infamous warrior Achilles, noble protector Hector, wayward prince Paris and vengeful king Menelaus. Lead an army across the fabled lands of the Aegean, recruit special units inspired by creatures of Greek myth, and charge into battle against ferocious foes. Build your empire through strategy, statecraft, diplomacy and all-out war, as you conquer this vast and striking recreation of the Bronze Age Mediterranean.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-0m2ur1", "title": "Absolute Drift", "genre": "Экшены, Казуальные игры, Инди", "platform": "Steam/Epic", "year": 2015, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/320140/header.jpg?t=1778227928", "desc": "Дрифт - искусство бокового скольжения.. В Absolute Drift ты овладеешь искусством дрифта. Оттачивай свои навыки в свободных заездах, участвуй в соревнованиях Driftkhana, а также демонстрируй свое мастерство в Mountain Drifting, на сложных трассах, расположенных в горах. Особенности 6 машин с различными характеристиками 3 режима игры: Driftkhana, Drifting и Mountain Drifting на более чем 24 трассах 5 уникальных зон для свободной езды, от аэропорта и морских доков до мегаполиса Таблица лучших результатов со всего мира онлайн Более 3 часов Drum & Bass и электронной музыки от C41 и Nyte Поддержка контроллеров PS4, Xbox и их аналогов", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-8yg9xc", "title": "ABZU", "genre": "Приключенческие игры, Казуальные игры, Инди", "platform": "Steam/Epic", "year": 2016, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/384190/header.jpg?t=1758304762", "desc": "ABZÛ — это красочное приключение в подводном мире, где вам предстоит заниматься дайвингом. Погрузитесь в живописный мир океана, полный загадок и ярких красок. Откройте уникальные виды животных и создайте мощную связь с морскими жителями. Погрузитесь в самое сердце океана, где древние секреты лежат в забвении. Будьте осторожны, в морских пучинах вас ждет опасность. Название «ABZÛ» взято из древних мифологий. «AB» означает «вода», а «ZÛ» означает «знать». ABZÛ — это океан мудрости.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-zg3yj8", "title": "Acceleration of SUGURI 2", "genre": "Экшены, Инди", "platform": "Steam/Epic", "year": 2018, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/390710/header.jpg?t=1773470717", "desc": "Молниеносный тактический shoot'em'up, в котором вы можете сразиться со всеми персонажами из вселенной SUGURI. Узнайте больше о персонажах, которых вы знаете и любите, а также встретьтесь с новым злодеем, готовым сеять хаос на Земле. Играйте против компьютера в режиме истории, или против других игроков локально или онлайн. Acceleration of SUGURI 2 - прямой сиквел к игре Sora. Особенности: - Скоростные, тактические схватки один на один с элементами Bullet Hell - Поддержка высоких разрешений (Full HD и выше) - Три режима игры: сюжетный, аркадный и матч - Мультиплеер вдвоём на одном экране, или онлайн с сетевым кодом, поддерживающим Rollback - Более 10 персонажей из вселенной SUGURI, за каждого из которых можно играть", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-st8m69", "title": "Adios", "genre": "Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1271400/header.jpg?t=1675376664", "desc": "Adios is a cinematic first-person game about sticking to a complicated decision. You're a pig farmer in Kansas. It's October. Cold, crisp mornings are the norm, and you have decided that you're no longer okay with letting the mob use your pigs to dispose of bodies. When your old friend - a hitman - arrives with his assistant to deliver another body, you finally screw up the courage to tell them that you're done. Your friend doesn't want you to stop. He knows that there's no such thing as quitting, so he'll try to convince you that you're making a mistake. You spend the day together, doing chores and exploring the nooks and crannies of an authentic environment in the American Midwest alongside the man who will be forced to kill you, if he can't convince you to stay. How you respond will determine the rest of your life. Adios means goodbye.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-et15m9", "title": "Aegis Defenders", "genre": "Экшены, Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2018, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/371140/header.jpg?t=1779390814", "desc": "Исследуйте, стройте и защищайте в этой уникальной игре — не то в жанре «экшен-платформера», не то «защиты башни». Вам предстоит примерить на себя роль... целой команды Ruinhunters, которой нужно отыскать величайшее оружие Aegis. Только с его помощью они смогут спасти свою деревню.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-ievq6l", "title": "Aeonic", "genre": "Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2024, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/3277530/a0c3f617c7e8f3b50958babae1cf4ebccccf7d18/header.jpg?t=1777390507", "desc": "Aeonic is a very simple text-based adventure. No real gameplay. You just go through slides representing eras of history, each of slides with text and an illustration. You also have two choices on most of the slides which lead to different outcomes for the era. Some choices lead to different endings. That's it. More of an interactive book than a game. If you want to appreciate this project try to think about its idea when playing - what if you could go from the beginning of history to nowadays and even the future, through all eras, in one game or even a gameplay loop.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-9uczwy", "title": "Aerial_Knight's Never Yield", "genre": "Экшены, Приключенческие игры, Казуальные игры", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1323540/182f37d580491c2defe5b920e29ca0bfec3427aa/header.jpg?t=1782141824", "desc": "СЮЖЕТ Вам предстоит играть от лица загадочного персонажа Уолли. Он нашел то, что было у него украдено. Теперь остается надеяться, что вам хватит прыти убежать от врагов. Выясните правду и постарайтесь раскрыть тайну произошедшего. ИГРОВОЙ ПРОЦЕСС Aerial_Knight's Never Yield — это трехмерный сайд-скроллер в жанре классического «бесконечного раннера». Захватывающая сюжетная интрига все время держит игроков в напряжении. Бегите, прыгайте, скользите и находите потрясающие комбинации акробатических элементов, чтобы преодолевать препятствия. Игрой Aerial_Knight's Never Yield смогут насладиться как любители паркура, так и самый широкий круг игроков. САУНДТРЕК Саундтрек для Aerial_Knight's Never Yield пишет музыкант Danime-Sama из Детройта. В нем будут использованы вокальные партии исполнителей со всего мира. ОТ РАЗРАБОТЧИКА Этот проект начинался как хобби: я делал его для себя. Мне хотелось создать что-то одновременно новое и знакомое для сегодняшнего поколения геймеров, а также обратить...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-lot90b", "title": "Alan Wake's American Nightmare", "genre": "Экшены, Приключенческие игры", "platform": "Steam/Epic", "year": 2012, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/202750/c776879ae6a5754294b1fe9e18564ac3545e856b/header.jpg?t=1769717428", "desc": "В этот раз Алан Уэйк сразится с мистером Скрэтчем, вестником тьмы! Новый захватывающий сюжет, орды ужасающих врагов, серьезное оружие и прекрасные пейзажи Аризоны, а также увлекательный новый режим станут настоящим подарком для фанатов Алана Уэйка, а для всех остальных — отличной возможностью познакомиться с историей писателя. Основные особенности: Полноценная история: Остановите вашего злобного двойника, который стремится забрать вашу жизнь... и изменить реальность вокруг! Бой до рассвета: Отточите ваше мастерство владения светом в новом аркадном режиме и превзойдите ваших друзей на досках почета. Доживете ли вы до восхода солнца? Взгляните в лицо тьме: Опасные твари бредут за вами в тенях. В вашем распоряжении мощнейший арсенал — уничтожьте их!", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-1l1a4x", "title": "Alien: Isolation", "genre": "Экшены", "platform": "Steam/Epic", "year": 2014, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/4665290/21eb5925869fb99fccbc24e682b0db22b9494543/header.jpg?t=1782805186", "desc": "Когда поисковая команда обнаруживает на отдаленной колониальной планете таинственные обломки космического корабля, одна из участниц решает во что бы то ни стало исследовать их. Никто оказывается не готов к ужасу, который внезапно обрушивается на поселение команды. Безопасности нет нигде. С этого начинается отчаянное стремление выжить и сбежать, а смертоносное существо идет за исследовательницей по пятам.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-lcsad0", "title": "Amnesia:  The Dark Descent", "genre": "Экшены, Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2010, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/57300/header.jpg?t=1751032707", "desc": "Последние оставшиеся воспоминания вот-вот растворятся в темноте. Ваш разум в смятении. Вы обязаны выбраться наружу. Проснитесь... Amnesia: The Dark Descent — это хоррор от первого лица на выживание. Это игра об изучении, жизни и погружении в атмосферу ночного кошмара. Это то, от чего у вас точно побегут мурашки по коже. Вы остановились в узком коридоре, услышав чей-то плач вдалеке. И он становится все ближе. Изучайте... В Amnesia: The Dark Descent вы будете играть роль Даниеля, проснувшегося в безлюдном замке и почти ничего не помнящего о своем прошлом. Пробираясь по мрачным дорожкам, вы должны будете восстановить часть своей памяти. Страх и ужас бродит не только снаружи, но и изнутри замка. Вас ждет пугающее неизвестностью путешествие в самые темные уголки людского разума. Услышали звук чьих-то шагов? Или это просто игра вашего разума? Ощущайте... С применением мира, действующего по всем законам физики, поражающе острой 3D-графики и динамичного звукового сопровождения, этот мир...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-i4oqo9", "title": "Amnesia: A Machine for Pigs", "genre": "Экшены, Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2013, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/239200/header.jpg?t=1727954562", "desc": "Мир - это машина! Машина для свиней, предназначенная лишь для их убоя. От создателей игр «Амнезия: Призрак прошлого» и «Дорогая Эстер» представляем новый хоррор от первого лица, который утащит вас в пучины жадности, власти и безумия. Он вопьется в ваши ребра и сожрет ваше сердце. На дворе 1899 год Богатый промышленник Освальд Мандус просыпается в своей кровати в лихорадочном бреду, его преследуют кошмары о темной, дьявольской машине. После жуткой поездки в Мексику его терзают видения некой индустриальной утопии, угрызения совести и тропическая лихорадка, и он попадает в мир своих кошмаров. В доме тишина, а пол под ним шатается по воле какой-то адской машины: он знает лишь, что его дети в большой опасности, и что их спасение в его руках. Уникальные свойства Новый, свежий подход к миру «Амнезии», не отходя при этом от ее истоков. Самая темная и ужасающая история, рассказанная когда-либо в компьютерной игре. Потрясающий саундтрек от признанного композитора Джессики Карри.", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-qjz19m", "title": "Amnesia: Rebirth", "genre": "Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2020, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/999220/header.jpg?t=1752056337", "desc": "Вы не решаетесь даже дышать. Тварь в считанных сантиметрах от вас. И она жаждет насытиться охватившим вас ужасом. И вот вы, согнувшись, крадетесь во тьме, пытаясь подавить страх и заглушить голос, что таится внутри. «Я тебя знаю. И знаю, на что ты способна». В Amnesia: Rebirth вы играете за Таси Трианон, которая приходит в себя в недрах алжирской пустыни. Прошло уже много дней. Где вы были? Что делали? Где все остальные? Воссоздайте маршрут своего пути, соберите разрозненные фрагменты прошлого — это единственный способ пережить тот беспощадный ужас, что вот-вот поглотит вас. «Не позволяй себе гневаться. Не позволяй себе бояться». Времени мало. Встаньте на место Таси, чтобы прожить ее ужас и боль. Вам предстоит выдержать не только поход через пустынный ландшафт, но и переживания, связанные с собственными надеждами, страхами и горечью сожалений. Продолжайте путь. Делайте шаг за шагом. Ведь если вы проиграете, то потеряете всё. Для тех, кто хочет познакомиться с сюжетом и погрузиться в...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-3jte99", "title": "Among the Sleep - Enhanced Edition", "genre": "Indie, Adventure", "platform": "Steam/Epic", "year": 2014, "rating": 80, "image": "https://media.rawg.io/media/games/41b/41b9f5119f03663dcc3ead3501beab14.jpg", "desc": "", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-m1pcmn", "title": "Among Us", "genre": "Казуальные игры", "platform": "Steam/Epic", "year": 2018, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/945360/header.jpg?t=1781287930", "desc": "Приветствуем новобранцев! Пора отправиться на новую карту — Airship! Работайте в команде, чтобы воплотить в жизнь амбициозный план... а принесете ли вы пользу или станете предателем, уже другой вопрос. Бесплатное обновление включает: четвертую и самую большую игровую карту из всех доступных; новые задания (огранку самоцветов, вынос мусора (чья очередь?) и многое другое); возможность выбрать комнату для начала игры; новые локации, полные сюрпризов (порой неприятных); лестницы и движущиеся платформы для большей свободы действий; новые бесплатные шапки (сердечко, сердитые брови, гриву единорога, резиновую перчатка и другие)! Играйте в команде от 4 до 15 игроков по сети или локальному Wi-Fi-соединению и подготовьте космический корабль к отлету, но будьте осторожны: один или несколько членов экипажа — предатели, которые хотят всех убить! Эта игра была создана для встреч с друзьями. Мы рекомендуем играть с друзьями по локальной сети или онлайн с использованием голосового чата. Доступны...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-s57kp6", "title": "Ampersat", "genre": "Экшены, Приключенческие игры, Ролевые игры", "platform": "Steam/Epic", "year": 2022, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1356040/header.jpg?t=1782405985", "desc": "Ampersat is a shooty, slashy, RPG-y game mixing old-school/retro and modern sensibilities. A blend of influences from Gauntlet and Smash TV to Zelda and a dash of Angband, this is a handcrafted adventure with much appeal to fans of Roguelites. A labor of love from a solo developer, Ampersat distills some favorite childhood gaming experiences into a fresh, fun hybrid that sees you killing a lot of monsters, finding a lot of loot, freeing captured letters (um, what?) and growing from a world-weary warrior mage into a powerful smashing/blasting machine! Main Features More than 50 handcrafted levels, many with exploration and light puzzles Optional endless procedural area Original gameplay elements based around freeing and capturing letters Flexible character progression with extensive skill tree Hundreds of unique pieces of loot find, buy, sell and augment Upgradeable town hub Tackle stages in the order you choose 50 unique creature types with individual AI, 10 fiendish bosses Drop-in...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-x0gvd7", "title": "Angel's Dreams", "genre": "Приключенческие игры, Казуальные игры, Инди", "platform": "Steam/Epic", "year": 2026, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/4095190/0ed78e8a38c2ab266930b4b0e8307b544d3b7ebc/header.jpg?t=1783702059", "desc": "Анжелика просыпается среди ночи от громкого стука в дверь. Но, взяв свой верный фонарь и выйдя из комнаты, она обнаруживает, что привычные коридоры родного особняка изменились. Они стали бесконечными, искажёнными и полными тихого ужаса. Это не её дом. Это ловушка — мир снов, повторяющий её жилище, но населённый кошмарами. Застряв в петле кошмара, ей предстоит разгадать тайны этого места, чтобы найти выход. Но этот мир жаждет заполучить её чистую душу, чтобы восстановить свои силы, и его обитатели уже выслеживают её. Особенности игры: Сюрреалистичный хоррор : Исследуйте постоянно меняющийся особняк, где реальность искажается, а привычные места таят смертельную опасность. Выживайте и учитесь : Мир меняется с каждой попыткой. Изучайте аномалии, запоминайте расположение ловушек и врагов, чтобы пройти дальше в следующей попытке. Охота за аномалиями : Ваша главная задача — находить и взаимодействовать с искажениями реальности, чтобы распутывать тайны петли и ослабить хватку кошмарного мира...", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-zg7n1s", "title": "Animal Crossing: New Horizons", "genre": "Simulation", "platform": "Switch", "year": 2020, "rating": 80, "image": "https://media.rawg.io/media/games/42f/42fe1abd4d7c11ca92d93a0fb0f8662b.jpg", "desc": "", "createdAt": "2026-07-15T00:27:33.393Z"}, {"id": "1784075253393-s47qqw", "title": "Anodyne 2: Return to Dust", "genre": "Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2019, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/877810/header.jpg?t=1766101891", "desc": "Спасите загадочный остров от поражающей сознание чумы! Нано Пыль инфицирует островитян Новой Земли, поражая их чувства и извращая желания. Вы играете за Нову -- Нано Чистильщицу, которая должна исследовать остров g alternate dimensions and taking down mini-bosses and their minions. With the help of General Shellshock and his band of daring Defenders, you’ll battle your way through enemy hordes to unravel the mysterious event known as the Deadtime. Shoot and Loot Loads of randomly-generated loot, each with their own unique stats and abilities. Explore different game modes to keep the mission going like Assault, Defend, Rescue, Blitz, and Void Runs. Customize Customize your character to create your ultimate Defender. Unlock character perks that enhance your unique play-style. Personalize your...", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-nzovk7", "title": "Death Howl", "genre": "Приключенческие игры, Инди, Стратегии", "platform": "Switch", "year": 2025, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2825880/895480a8fb886661e596d50b168ab86fbfcaff19/header.jpg?t=1781528133", "desc": "Ступайте в окутанные легендами земли, где охотница Ро отправляется в путь, чтобы вернуть своего сына из мертвых. Погрузитесь в глубины мира духов, расколотого на четыре части и 13 отдельных регионов. Сражайтесь с более чем 30 типами врагов и используйте потенциал более 160 карт, создавая уникальные архетипы и множество мощных комбинаций. Вас ждет мрачное путешествие более чем на 25 часов, со множеством захватывающих побочных заданий и битв с грозными боссами. Создайте более 160 карт и соберите синергетические колоды, основанные на яде, силе, жертвоприношении, возмездии, ударах в спину, блокировании, скорости и многом другом. Откройте шаманские тотемы с уникальными эффектами, которые усилят вашу колоду. Каждый новый элемент позволяет вам адаптировать свой тактический стиль при подготовке к следующей смертельной схватке. Столкнитесь со множеством неупокоенных духов — псочерепами, взрывохрустами, скорбными морскими грибами и т. д. — в боях на сетке, где каждый ход имеет решающее...", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-ouacrb", "title": "Death Stranding", "genre": "Экшены, Приключенческие игры", "platform": "Steam/Epic", "year": 2022, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1850570/header.jpg?t=1773400635", "desc": "Легендарный творец Хидэо Кодзима представляет окончательную версию DIRECTOR’S CUT знаковой для жанра игры. Таинственное событие, известное как Death Stranding, в будущем открыло дверь между миром живых и миром мертвых. Как результат, уродливые потусторонние твари отправились бродить по падшему миру, в котором почти не осталось людей. Действуя от лица Сэма Бриджеса и объединяя последних выживших на территории Америки, вам предстоит возродить надежду человечества. Удастся ли вам шаг за шагом воссоединить разрушенный мир? DEATH STRANDING DIRECTOR’S CUT на ПК обеспечивает ВЫСОКУЮ ЧАСТОТУ СМЕНЫ КАДРОВ и предоставляет ФОТОРЕЖИМ и ПОДДЕРЖКУ СВЕРХШИРОКИХ МОНИТОРОВ. Также включает в себя перекрестный контент из серии HALF-LIFE корпорации Valve и Cyberpunk 2077 от CD Projekt Red. Оставайтесь на связи с игроками по всему миру с помощью Social Strand System™. Все копии игры также будут содержать: • Цифровую книгу \"Selections From The Art of DEATH STRANDING\" (изд. Titan Books). • Исправления в...", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-12gatw", "title": "Deathmatch Classic", "genre": "Экшены", "platform": "Steam/Epic", "year": 2001, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/40/header.jpg?t=1745368570", "desc": "Получите удовольствие от скоростной мультиплеерной игры в Deathmatch Classic (сокращенно DMC). В DMC Valve цитирует игры от id Software: игрокам предлагается вооружиться «ракетницами» и проверить рефлексы в различных футуристических окружениях.", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-ab9xpb", "title": "Deceit", "genre": "Экшены, Бесплатные", "platform": "Steam/Epic", "year": 2023, "rating": 80, "image": "https:// 34b3e72/header_russian.jpg?t=1763685233", "desc": "Окунитесь в темный подводный мир, где вам предстоит стать акулой или водолазом и одолеть своих врагов с помощью смекалки, командной игры и скрытности. Приготовьтесь познать беспощадный экшн и напряженность охоты. В Depth вам всегда придется быть начеку, ведь ИИ-противники или другие игроки не дадут вам отдохнуть ни секунды. Станьте акулой Для вас, как для представителя любого из 7 видов акул, главным оружием являются чутье и скорость. Выслеживайте свою добычу по всему океану и разрывайте ее напополам своими острыми зубами. Станьте белой, тигровой, серо-голубой, молотоголовой или лисьей акулой, и даже ископаемой акулой мегалодоном! Станьте водолазом Вы — водолаз, который исследует темные глубины в поисках сокровищ и использует накопленное богатство для приобретения нового снаряжения. Защитите себя с помощью большого количества мощного оружия: от ружей для подводной охоты до подводных автоматов и мин. Напряженная атмосфера Испытайте ужас, охватывающий тех, кто плавает во тьме океана....", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-bmuxw4", "title": "Depths Of Horror: Mushroom Day", "genre": "Экшены, Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1590840/header.jpg?t=1775059568", "desc": "Depths Of Horror: Mushroom Day - это 3D игра от первого лица в жанре приключения и хоррор, позволяющая окунуться в глубину ваших страхов. Во время национального праздника Дня грибов вы решили попробовать себя в роли грибника. Собирая грибы на поляне, вы наткнулись на заброшенную хижину. Исследуя её, вы попадаете в пещеру, полную неожиданных обитателей и « сюрпризов ». С этого момента начинается ваша борьба за выживание , а значит появилась возможность проверить вашу смекалку и выдержку. Сможете ли вы найти выход из пещеры, минуя врагов и различные преграды, и одержать достойную победу над злом и своими as evolved to a point where human like androids are everywhere. They speak, move and behave like human beings, but they are only machines serving humans. Play three distinct androids and see a world at the brink of chaos – perhaps our future - through their eyes. Your...", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-b2i2p7", "title": "Deus Ex: Mankind Divided", "genre": "Экшены, Ролевые игры", "platform": "Steam/Epic", "year": 2017, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/526180/header.jpg?t=1681397927", "desc": "Откройте для себя шесть знаменитых уровней из Deus Ex: Mankind Divided — впервые в формате виртуальной реальности. Известные по серии Deus Ex художники использовали всю мощь Dawn Engine, чтобы снова воплотить Дубай, Город Големов, Прагу и даже квартиру Адама Дженсена с невообразимым уровнем детализации. В Deus Ex — VR Experience вы сможете осмотреть вблизи ряд трехмерных моделей главных героев и второстепенных персонажей из игры.", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-utxs2o", "title": "Devil May Cry 4 Special Edition", "genre": "Action", "platform": "Steam/Epic", "year": 2015, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/329050/header.jpg?t=1768869714", "desc": "Take control of one of five playable characters in the Special Edition of Devil May Cry 4, the ultimate version of the smash-hit stylish action game! Devil May Cry 4 immerses gamers in a gothic supernatural world, where a new protagonist clashes with a familiar hero. As the new leading man, Nero, players will unleash incredible attacks and non-stop combos using a unique new gameplay mechanic, his powerful \"Devil Bringer\" arm. On the coast of a distant land lies the castle town of Fortuna. It is here that the group known as the Order of the Sword practices a mysterious religion. They revere the demon warrior Sparda, who as their god fought to protect humans, and are committed to the extermination of all demons. Nero, a young knight from the Order, is tasked with finding Dante, the mysterious assassin who murdered the head of the Order of the Sword. At the same time, more demons begin to appear throughout the city. Nero will soon come to discover the motives behind Dante's appearance...", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-b98jc6", "title": "Devil May Cry 5", "genre": "Экшены", "platform": "Steam/Epic", "year": 2019, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/941965/header.jpg?t=1702627054", "desc": "Бич дьявола, с виду похожий на связку бананов. Шутки ради Нико создала его из материалов, оставшихся после сборки Кавардака. Большие, изогнутые, вращающиеся бананы поднимают настроение, но не слишком полезны в бою. В фургоне этот Бич не найти, но иногда его можно встретить на уровнях. Примечание. Им нельзя пользоваться в Кровавом дворце.", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-5di7l6", "title": "Devil May Cry HD Collection", "genre": "Action", "platform": "Steam/Epic", "year": 2018, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/631510/header.jpg?t=1768869867", "desc": "The popular stylish action games Devil May Cry, Devil May Cry 2, and Devil May Cry 3 Special Edition return in one collection! As Dante, the ultimate devil hunter, you'll join forces with appealing characters such as Trish, Lady, and Lucia and enjoy incredible action for the first time in blistering 60fps. Devil May Cry: The first appearance of Dante, the ultimate devil hunter! With the blood of a legendary demon warrior flowing through his veins, Dante takes on the king of the underworld, Mundus. Devil May Cry 2: Dance with the devil. Set decades after the first game, this sequel adds moves like the wall run and Rain Storm, bringing Dante's action to the next level of stylishness. The bonus mode Bloody Palace a o blow up. Sounds easy, right? Well, obviously you’ve never owned a cat. You see, tangled up in the deck are multiple fiery-furred kitties waiting to land in your hand and detonate your hopes of victory. Hope you have a Defuse card ready! The last one standing is crowned...", "createdAt": "2026-07-15T00:27:33.395Z"}, {"id": "1784075253395-0cltyb", "title": "Eye of the Beholder", "genre": "Приключенческие игры, Казуальные игры, Инди", "platform": "Steam/Epic", "year": 2020, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1425330/header.jpg?t=1607025308", "desc": "Step into war-torn enemy territory in this immersive VR game experience based on the Oscar-shortlisted documentary MY ENEMY, MY BROTHER (2015). EYE OF THE BEHOLDER is a 20 beta minute experience that subverts the war-game genre as players must choose to combat or collaborate with others. As a documentarian I am inspired by real life situations and stories and in 2014, I was lucky enough to meet two men whose story changed my life and that of many others. Zahed and Najah are former enemy soldiers who have become blood brothers for life. Zahed was an Iranian child soldier during the Iran-Iraq War when he found Najah, an enemy soldier, injured in a bunker. Zahed made a split-second decision in the heat of the battlefield and instead of shooting Najah, he risked his own life to save him. I was deeply inspired by Zahed's ability to recognize the humanity in his enemy. His act of bravery has had lasting ramifications in both their lives and those of their families. I documented their story...", "createdAt": "2026-07-15T00:27:33.396Z"}, {"id": "1784075253396-dcn8sk", "title": "Eye of the Beholder II: The Legend of Darkmoon", "genre": "Ролевые игры", "platform": "Steam/Epic", "year": 2022, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1882261/header.jpg?t=1648566411", "desc": "Following your quest in the sewers beneath, you and your party are recovering with Waterdeep’s finest healers, when a letter arrives from Khelben Blackstaff, mystic advisor to the Lords of Waterdeep. Trouble is brewing in the Northern and Western regions, and he has tasked you with exploring the land and investigating these incidents. Although nothing has been confirmed, renowned but troublesome archaeologist, Wently Kelso believes the disturbances are related to an evil uprising and the presence of a powerful ancient artefact. These troubles could, of course, simply be the work of unruly bandits, but since Kelso’s previous findings in the sewers of Waterdeep proved true, one would be wise not to easily dismiss his opinion on the matter. Therefore, you should exercise greater care and vigilance as you begin your next adventure.", "createdAt": "2026-07-15T00:27:33.396Z"}, {"id": "1784075253396-q23ktq", "title": "Eye of the Beholder III: Assault on Myth Drannor", "genre": "Ролевые игры", "platform": "Steam/Epic", "year": 2022, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1882262/header.jpg?t=1648566431", "desc": "Having rid the sewers of Waterdeep and the dreaded Temple Darkmoon of the evil forces within, you and your companions are surely deserving of a strong drink, good food and a warm fire. And so, your first port of call is to the nearest tavern, where you slop ale all over yourself and engage in jovial antics as you regale your adventures to your captivated listeners and admirers. However, in the midst of your retelling, the tavern door is thrust open by a hooded figure, whose eyes scan the crowd before locking on you and your party. Approaching you, he quickly introduces himself and explains his reasons for disturbing the festivities; his master wishes you to free the ruined city of Myth Drannor from the clutches of a Lich and restore it to its former glory. Looks like your adventures aren’t over just yet…", "createdAt": "2026-07-15T00:27:33.396Z"}, {"id": "1784075253396-zsg5zd", "title": "F.I.S.T.: Forged In Shadow Torch", "genre": "Экшены, Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1330470/header.jpg?t=1750952195", "desc": "После того, как шесть лет назад животные Города Факелов были побеждены вторгшимся Легионом Роботов в Войне сопротивления, кролик Райтон, бывший боец Сопротивления, держался в тени. Арест его друга означал, что у него не было другого выбора, кроме как надеть свой гигантский металлический кулак и бороться против тех, кто его угнетает. Он не знал, что вскоре попадет в водоворот заговоров с участием Легиона, Сопротивления и Крысиной Банды. Непрерывные карты с множеством заданий для исследований Откройте для себя более десятка уникальных областей на карте в стиле экшн-платформера (Метроидвания). Основные боевые действия, решение головоломок и механика платформы дополняются бесчисленными потайными комнатами, секретными проходами и короткими путями со всевозможными наградами за выполнение заданий. Карты загружаются на лету, чтобы избежать частых переходов, что делает массивный Город Факелов еще более детализированным и живым. Аркадная боевая система с плавным переключением между тремя видами...", "createdAt": "2026-07-15T00:27:33.396Z"}, {"id": "1784075253396-o8cb3z", "title": "F1 2015", "genre": "Racing, Sports", "platform": "Steam/Epic", "year": 2015, "rating": 80, "image": "https://media.rawg.io/media/games/ff6/ff66ce127716df74175961831ad3a23a.jpg", "desc": "", "createdAt": "2026-07-15T00:27:33.396Z"}, {"id": "1784075253396-zp02km", "title": "Faaast Penguin", "genre": "Экшены, Казуальные игры, Гонки", "platform": "Switch", "year": 2024, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2590150/231cb2c04d7e96ec90e920a5cee65b7bb08637d4/header.jpg?t=1782199168", "desc": "Вот это отпуск! Пингвины сражаются друг с другом в гонках на выбывание, Полетели! 🐧Основы aeria's The Hub)!", "createdAt": "2026-07-15T00:27:33.396Z"}, {"id": "1784075253396-s2l101", "title": "Fallout 2: A Post Nuclear Role Playing Game", "genre": "Ролевые игры", "platform": "Steam/Epic", "year": 2009, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/38410/header.jpg?t=1572025546", "desc": "Fallout® 2 — это продолжение признанной всеми игры, которая вытащила жанр RPG из подземелий и поместила его в динамичное, апокалиптическое ретро-будущее. Прошло 80 лет с тех пор, как ваши предки пересекли пустоши. Чтобы спасти свою полудикую деревню от вымирания, вы отправляетесь на поиски утерянной технологии, известной как «Генератор Эдемских Кущ Компактный». В ходе поисков вам предстоит столкнуться с критическими дозами радиации, ордами мутантов и и неумолимым потоком лжи, подлости и предательства. И даже в самые сложные минуты, когда начинает казаться, что этот новый мир уже ничего не может дать людям, не отчаивайтесь и идите к цели. Осваивая умения и особенности своего персонажа в Fallout® 2, попытайтесь выстоять против пост-ядерного мира, будущее которого увядает с каждой секундой...", "createdAt": "2026-07-15T00:27:33.396Z"}, {"id": "1784075253396-fjee49", "title": "Fallout Tactics: Brotherhood of Steel", "genre": "Стратегии", "platform": "Steam/Epic", "year": 2009, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/38420/header.jpg?t=1572025647", "desc": "То, чего так не хватало вселенной Fallout® — тактические взводные бои! Сейчас ты — ничтожный отброс. Ты рожден в грязи, но мы тебя закуем в сталь. Ты научишься быть гибким или сломаешься. В эти темные времена Братство — твое Братство — это то единственное, что защищает вновь зажженную искру цивилизации от мрачной, радиоактивной пустоши. Оружие станет для тебя не просто инструментом, а лучшим другом. Ты будешь воодушевлять убогих и защищать слабых… хотят они того или нет. Боевые товарищи станут тебе семьей. А честь, почет и военн pps/797410/header.jpg?t=1598622276", "desc": "Крепко держитесь за голову в Headsnatchers! Ведь в этой безумной игре, рассчитанной на 4 игроков и поддерживающей сетевой и локальный режимы, для победы нужно лишать голов своих соперников. И поверьте, вы сделаете всё, что угодно, лишь бы победить. ЛОКАЛЬНАЯ ИЛИ СЕТЕВАЯ, НО ОЧЕНЬ ПРИЧУДЛИВАЯ Бросайте вызов своим друзьям в потасовках, цель которых — сорвать голову с плеч противника и с помощью неё добиться столь желанной победы! В игре Headsnatchers 25 смешных карт с уникальными, невероятными орудиями и особенностями, со своими правилами и тактикой. Ну, скорее не правилами, а рекомендациями. Никто ведь не любит правила. Бросайте черепушки своих товарищей в кольцо, как Леброн, швыряйте котелок дедушки через портал в ад, как тот парень из Doom™, и сливайте жбан своей сестры в унитаз, словно ту личинку, которую отложили через пять часов после пожирания суперогромной пиццы. Что бы вам ни пришло в голову, у нас это есть. Ну, почти. ДОЛОЙ ИМ ГОЛОВЫ (100+) Поскольку дети в наше время мечтают...", "createdAt": "2026-07-15T00:27:33.396Z"}, {"id": "1784075253396-3bgiqq", "title": "Hell is other demons", "genre": "Экшены, Инди", "platform": "Steam/Epic", "year": 2019, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/595790/header.jpg?t=1667025584", "desc": "Bullet Hell, in Hell, Flawlessly Executed You grew up with the bullet hell arcade shooters which rewarded fast-decision making and creativity? Hell is Other Demons is crafted with expertly executed mechanics and bold, unforgettable style. Features Retro Bullet Hell Shooter - Fast-paced fair, but challenging, combat rewards practice and creativity. A Campaign Through Hell - Explore an extensive world full with thousands of demons and wonderfully over-the-top bosses. Arcade Mode - Fans of classic, high-score based arcade games will find a cozy home in this mode, with unlimited, procedurally generated action, and infinite replayability. Unfo le Nightmares – это мрачная сказка, которая заставит вас вспомнить свои детские кошмары. Помогите Шестой выбраться из Чрева – подводного судна, полного жутких существ, ищущих, чем бы поживиться.", "createdAt": "2026-07-15T00:27:33.397Z"}, {"id": "1784075253397-4z1qo5", "title": "Little Nightmares III", "genre": "Приключенческие игры", "platform": "Steam/Epic", "year": 2025, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1392860/7aba96b32736990ec8a131bfdf395d2dc35b282b/header.jpg?t=1783431943", "desc": "Два ребёнка заблудились в пугающем мире, где нет места детям. Если друзья не найдут выхода из Ниоткуда, их ждёт участь страшнее смерти. Играйте за Малого и Одну, лучших друзей, которые до знакомства скитались по пустынным землям порознь. У каждого из них есть любимое оружие: Малой носит лук, а Одна — гаечный ключ. Вместе они пытаются выжить, пробираясь по тайным лазам, преодолевая препятствия и защищая друг друга. Чтобы прокладывать себе путь и находить то, что скрыто, вам придётся полагаться не только на себя, но и на союзника, будь то ваш друг или персонаж, управляемый компьютером. Вам встретится множество подсказок и лазеек, которыми могут воспользоваться изобретательные дети. Стреляя из лука, Малой способен сбивать высоко расположенные цели, перерезать верёвки и поражать летающих противников, а гаечный ключ помогает Одной добивать оглушённых неприятелей, рушить преграды и управлять огромными механизмами. Ниоткуда — опасное место, где на каждом шагу вам будут встречаться чудовища....", "createdAt": "2026-07-15T00:27:33.397Z"}, {"id": "1784075253397-3xuibx", "title": "LivingForest", "genre": "Экшены, Приключенческие игры, Казуальные игры", "platform": "Steam/Epic", "year": 2024, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/3027490/header.jpg?t=1778365569", "desc": "In this forest, you can fight zombies and soldiers by picking up weapons. Players can use axes, pistols,gun to fight or collect resource and food,you also use resource build structure, and there some mission need finish. Game objective: try to live in forest More features Drive car Talk to someone for quest or message day and night different environment Weather changes", "createdAt": "2026-07-15T00:27:33.397Z"}, {"id": "1784075253397-mdv2of", "title": "LOCKDOWN Protocol", "genre": "Экшены, Казуальные игры, Инди", "platform": "Steam/Epic", "year": 2025, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2780980/header.jpg?t=1780159963", "desc": "Lockdown Protocol — это игра социальной дедукции от первого лица , сочетающая экшен в реальном времени и общение , рассчитанная на 1–16 игроков. Игроки должны работать вместе , чтобы выполнить задания вовремя. Большинство стремятся к победе , а небольшая группа диссидентов попытается помешать им, не будучи раскрытой.", "createdAt": "2026-07-15T00:27:33.397Z"}, {"id": "1784075253397-cx3xfk", "title": "Loop Hero", "genre": "Инди, Ролевые игры, Стратегии", "platform": "Steam/Epic", "year": 2021, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1282730/header.jpg?t=1751489185", "desc": "Лич заточил мир во вневременную петлю, и всех его обитателей поглотил нескончаемый хаос. В вашем распоряжении растущая колода загадочных карт, с помощью которой вам предстоит размещать врагов, здания и элементы ландшафта на пути отважного героя в каждом из его неповторимых путешествий. Добывайте могущественные трофеи для героев всех классов и экипируйте их перед битвой. Расширяйте лагерь выживших, чтобы ваша сила росла с каждым приключением в петле. Открывайте новые классы, карты, бонусы и коварных стражников в борьбе за разрыв замкнутого круга страданий. Бесконечное приключение: выбирайте класс персонажа, карты из колоды и отправляйтесь в путешествие по случайно генерируемому пути. Каждое приключение не похоже на предыдущее, а по мере прохождения будут открываться новые карты и  your progress with weapons and trophies! The...", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-rl556j", "title": "Portal", "genre": "Экшены", "platform": "Steam/Epic", "year": 2007, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/400/header.jpg?t=1745368554", "desc": "Portal™ — новая игра от Valve для одного игрока. Portal, действие которого происходит в загадочных лабораториях компании Aperture, был назван одной из самых новаторских игр современности и предлагает вниманию игрока множество часов непохожей ни на что головоломки. Дизайн игры заставляет игрока изменить подход, способы взаимодействия и оценку возможностей в рамках заданного окружения, наподобие того, как гравипушка в Half-Life® 2 изменила способы обращения с объектами в разных ситуациях. Игроки должны решить физические загадки и выйти из сложных ситуаций, открывая порталы для перемещения предметов и самих себя в пространстве.", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-20096m", "title": "Portal 2", "genre": "Экшены, Приключенческие игры", "platform": "Steam/Epic", "year": 2011, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/620/header.jpg?t=1745363004", "desc": "В Portal 2 вы откроете для себя инновационный геймплей, сюжет и музыку, которая помогла оригиналу заработать более 70 наград в игровой индустрии и стать культовым. Одиночный режим Portal 2 представит вам нескольких новых персонажей, разнообразные неожиданные головоломки и ещё больше тестовых комнат. Игроки смогут познакомиться с неизвестными им частями лаборатории Aperture Science и снова встретятся с ГЛаДОС — порою кровожадной компьютерной компаньоншей, которая сопровождала главную героиню на протяжении первой части игры. Играя в кооперативном режиме, игроки откроют для себя абсолютно новую, независимую от оригинальной сюжетную линию с уникальными тестовыми комнатами и двумя персонажами. Здесь каждому из вас придётся t=1728631522", "desc": "An enormous Boss Tower has sprung from the ground, lifting entire towns up with it. People got used to it and kept living on the tower, but they’re starting to contract all sorts of mysterious illnesses. Princess Remedy, still in Saturnian healing school, must use her powers to heal everyone and defeat the Boss Tower! The theme of love is back, and this time Remedy can date anyone she's healed to have them accompany her on her travels. Each companion offers a different ability in Healing Mode, such as Dash, Homing shots and Injection. More bosses! More secrets! A dance ball! In A Heap of Trouble is the prequel to the critically acclaimed Princess Remedy In A World of Hurt, free to play here on Steam.", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-2zw6k7", "title": "Prison Architect", "genre": "Инди, Симуляторы, Стратегии", "platform": "Steam/Epic", "year": 2015, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/233450/header.jpg?t=1759221867", "desc": "Приветствуем начальников тюрем! С самыми безжалостными преступниками планеты справится только по-настоящему безжалостный начальник. В Prison Architect вы сможете создать исправительное заведение по собственному вкусу. Ключевые особенности: Индивидуализация распределяйте ресурсы и оптимизируйте тюремный комплекс по своему усмотрению. Главное — контролируйте перемещение заключенных, ведь в любой тюрьме может случиться наводнение, пожар, драка или даже восстание. Инвестиции и инновации оформляйте заявки на государственное финансирование и пускайте собранные средства на борьбу с инфекциями, организованной преступностью, судебными тяжбами не только! Эффективный менеджмент обеспечивайте безопасность и (некоторую) защиту прав человека с помощью первоклассного персонала, в том числе вооруженной охраны, психологов, врачей, юристов и осведомителей. Каждому свое послужной список каждого заключенного требует уникальной программы реабилитации, труд e of them—ARCHON—is developing the technology to invade people’s minds. They have already tyrannized a planet called Teballai, and hope to use their mind-reading technology to spread their power across the galaxy. A second organization—FOE (Freedom Organization of Elites)—wants to destroy ARCHON’s technology in the name of freedom. When a young FOE soldier (you choose the gender) named Blaire obtains the ability to read minds from an ARCHON experiment, she finds her loyalty torn between both sides. Whether Blaire helps the enemy or defeats them depends upon your use of her power. One of the hallmarks of the traditional visual novel is a branching story line. This is typically accomplished via choices forced on the player. In some of the most complex visual novels, there are dozens of these choices and multiple endings. I call Quantum Conscience \"experimental\" because it seeks to do away with these choices. Outside of the very first few minutes of the game, in which the player chooses to be a male or female protagonist and answers some questions about their background, there are no...", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-jntm2p", "title": "Quiplash", "genre": "Казуальные игры, Инди, Стратегии", "platform": "Steam/Epic", "year": 2015, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/351510/header.jpg?t=1725046271", "desc": "For 3-8 Players and an Audience of thousands! The team behind the hit party games YOU DON’T KNOW JACK, Fibbage, and Drawful presents Quiplash, the laugh-a-minute battle of wits and wittiness! Use your phone or tablet to answer simple prompts like “Something you’d be surprised to see a donkey do” or “The worst soup flavor: Cream of _____.” No rules, no correct answers! Say whatever you want! Your answer is pitted against another player’s answer in a head-to-head clash of cleverness and comedy (or just “Which answer is least stupid?”). Other players – and even an Audience of peo onstruct the facts by piecing together what has been seen, said… and hidden. Solve enigmas tied to the cases and let intuition guide you: every observation can bring you closer to the truth or lead you astray. Strategic Turn-Based Combat When investigation is not enough, confrontation remains. Face supernatural entities in turn-based combat using spells and special ammunition. Prepare for unpredictable encounters: each enemy follows its own rules and demands focus, timing, and strategy. Execute precise sequences and ancient rituals to overcome threats, rely...", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-mmrn77", "title": "Remnant: From the Ashes", "genre": "Экшены, Приключенческие игры, Ролевые игры", "platform": "Steam/Epic", "year": 2019, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/617290/header.jpg?t=1764657526", "desc": "Remnant: From the Ashes – шутер на выживание от третьего лица, действие которого происходит в постапокалиптическом мире, захваченном монстрами. В роли одного из последних представителей человечества, в одиночку или в компании одного-двух товарищей, вам предстоит сразиться с ордами монстров и эпическими боссами, пытаясь закрепиться на чужой земле, отстроиться и вернуть себе утраченное. ОСТАТКИ ЧЕЛОВЕЧЕСТВА Мир был ввергнут в хаос с приходом древнего зла из другого измерения. Люди проигрывают войну за выживание, но надежду дает технология установки порталов в другие вселенные и параллельные миры. В порталы отправляются последние герои человеческой расы с целью проникнуть в тайны происхождения хлынувшего на Землю зла, одновременно ведя борьбу за ресурсы и территорию... БЕСКРАЙНИЕ ПРОСТОРЫ Для исследования доступны динамически генерируемые миры, видоизменяющиеся при новом прохождении: вас ждут другие карты, схватки, потенциальные задания и события. Враждебная среда и монструозные обитатели четырех уникальных миров игры обеспечат все новые испытания с каждым вашим приходом. Ваш девиз здесь – адаптация или смерть. СОБИРАЙТЕ РЕСУРСЫ. РАЗВИВАЙТЕСЬ. СПЕЦИАЛИЗИРУЙТЕСЬ. Победы над...", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-jv0sr6", "title": "Remothered: Tormented Fathers", "genre": "Экшены, Приключенческие игры, Инди", "platform": "Steam/Epic", "year": 2018, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/633360/header.jpg?t=1778183363", "desc": "“Remothered” - кинематографичная трилогия в жанре survival horror, подкупающая исключительно реалистичным геймплеем. История насыщена оригинальными сюжетными поворотами, которые не оставят игрока равнодушным. В “Remothered” психология играет важную роль: герои и злодеи не вписываются в рамки стереотипов, а грань между добром и злом размыта. Развитие игры схоже с повествованием фильма: игрок отождествляет себя с персонажем. Саундтрек за авторством Нобуко Тоды (Final Fantasy, Halo, Metal Gear Solid) и Луки Бальбони лишь усиливает жуткую атмосферу игры. Розмари Рид, привлекательная женщина 35 лет, посещает особняк бывшего нотариуса, доктора Фелтона, страдающего от таинственного недуга. Героиню встречает мисс Глория, сиделка, заботящаяся о старике. Когда Розмари раскрывает свои личность и истинные намерения, кошмар начинается. Расследование Розмари приводит ту к выводу, что исчезновение дочери владельца особняка, Селесты, связано с ужасающим массовым убийством. Возможно, доктор Фелтон и его жена Арианна - единственные люди, знающие всю правду, включая секрет истинного происхождения Селесты и таинственного фанатичного культа алых монахинь. “Remothered: Tormented Fathers” - первая часть...", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-ytwimx", "title": "Resident Evil", "genre": "Экшены, Приключенческие игры", "platform": "Steam/Epic", "year": 2027, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/4824610/28045d733a3ada082858b5b1a5149e33ee40f378/header.jpg?t=1780990195", "desc": "Переживите безумный кошмар. Resident Evil Veronica — это ремейк вышедшей в 2000 году Resident Evil Code: Veronica. Новый проект сохраняет дух оригинала, но при этом представляет обновлённый геймплей, переосмысленный сюжет и невероятно детализированную графику. Леденящая кровь история безумия и коварства, любви и ненависти переродится в новом хорроре на выживание уже в 2027 году. Прошло три месяца после биологической катастрофы в Раккун-Сити. Выбравшись из города вместе с Леоном С. Кеннеди и Шерри Биркин, Клэр Редфилд отправляется во Францию в поисках своего брата Криса. Однако там её ждёт встреча не с родным братом, а со спецотрядом «Амбреллы» — корпорации, ответственной за инцидент в Раккун-сити. Они похищают Клэр и отравляют её на таинственный остров Рокфорт. Теперь ей предстоит совершить отчаянный побег с этого отдалённого острова, который становится эпицентром ещё одной биокатастрофы, превращающей его в кошмар наяву.", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-vf8ba5", "title": "Resident Evil 2", "genre": "Экшены", "platform": "Steam/Epic", "year": 2019, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/920565/header.jpg?t=1592791564", "desc": "Примечание. Костюм можно выбрать в меню.", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-e2oswg", "title": "Resident Evil 3", "genre": "Экшены", "platform": "Steam/Epic", "year": 2020, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1173690/header.jpg?t=1728434855", "desc": "Оцените кусочек новой версии Resident Evil 3. Пройдите специально переработанный для этой демоверсии пролог игры и оцените трагедию, которая развернулась в Раккун-Сити.", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-nwkjc1", "title": "Resident Evil 4", "genre": "Экшены, Приключенческие игры", "platform": "Steam/Epic", "year": 2023, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam eam/apps/4459100/af658832ece60b230e8cbdb004b50ca1596b5959/header.jpg?t=1781052935", "desc": "Resident Evil Requiem, — новейшая и самая захватывающая часть культовой серии Resident Evil, — знаменует новую эпоху жанра survival horror. Пройдите сквозь пробирающий до дрожи ужас и сумейте выжить вместе с аналитиком ФБР Грейс Эшкрофт и легендарным агентом Леоном С. Кеннеди. Две точки зрения и два разных стиля игры сплетаются в одну эмоциональную, душераздирающую историю. Демоверсия дает возможность пройти часть начальных этапов игры. Обратите внимание: сохраненные данные из демоверсии нельзя перенести в полную версию игры.", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-j88x8g", "title": "RESIDENT EVIL RESISTANCE", "genre": "Action", "platform": "Steam/Epic", "year": 2020, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1295350/header.jpg?t=1767923462", "desc": "This costume allows the female survivors (Valerie, January, Becca and Jill) to wear the outfit seen on Claire Redfield as she searched for her missing brother in Resident Evil 2 (2019). Costumes can be selected in the Customize menu. You need to restart the game in order to see the costumes. Note: These cosmetic items are for use exclusively with Resident Evil Resistance.", "createdAt": "2026-07-15T00:27:33.399Z"}, {"id": "1784075253399-e91htj", "title": "Resident Evil Revelations", "genre": "Action, Adventure", "platform": "Steam/Epic", "year": 2013, "rating": 80, "image": "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/222480/header.jpg?t=1769125357", "desc": "Resident Evil ® Revelations returns redefined for PC complete with high quality HD visuals, enhanced lighting effects and an immersive sound experience. This latest version of Resident Evil Revelations will also deliver additional content including a terrifying new enemy, extra difficulty mode, integration with and improvements to Raid Mode. Raid Mode, which was first introduc
